<!DOCTYPE html>
<html>
<head>
    <title>Ciphera</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- CryptoJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

    <style>
       body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b, #0b1220);
    color: white;
    min-height: 100vh;
}

/* Center wrapper feel */
#app {
    max-width: 500px;
    margin: auto;
    padding: 20px;
}

/* Title */
h2 {
    text-align: center;
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 15px;
    color: #38bdf8;
}

/* AUTH BOX */
#authBox {
    text-align: center;
    margin-top: 80px;
}

#authBox input {
    width: 220px;
    padding: 10px;
    margin: 6px;
    border: none;
    border-radius: 10px;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: white;
    backdrop-filter: blur(10px);
}

#authBox button {
    margin-top: 10px;
}

/* GLASS BUTTON */
button {
    padding: 10px 14px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    background: linear-gradient(135deg, #38bdf8, #6366f1);
    color: white;
    font-weight: 500;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

/* CHAT CONTAINER */
.chat-container {
    width: 100%;
    height: 55vh;
    overflow-y: auto;
    padding: 10px;
    margin-top: 10px;

    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}

/* MESSAGE BUBBLES */
.message {
    padding: 10px 12px;
    border-radius: 16px;
    margin: 10px 0;
    max-width: 75%;
    word-wrap: break-word;
    font-size: 14px;
    backdrop-filter: blur(8px);
}

/* SENT */
.sent {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: black;
    margin-left: auto;
    text-align: right;
}

/* RECEIVED */
.received {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
}

/* TEXTAREA */
textarea {
    width: 95%;
    height: 60px;
    border-radius: 14px;
    padding: 10px;
    border: none;
    outline: none;
    resize: none;

    background: rgba(255,255,255,0.08);
    color: white;
    backdrop-filter: blur(10px);
    margin-top: 10px;
}

/* INPUT inside message */
.message input {
    margin-top: 8px;
    width: 90%;
    padding: 6px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

.cipher {
    font-family: monospace;
    font-size: 12px;
    opacity: 0.7;
    margin-bottom: 5px;
}
    </style>
</head>

<body>

<!-- 🔐 AUTH -->
<div id="authBox" style="text-align:center; margin-top:50px;">
    <h2>Ciphera Login</h2>

    <button onclick="googleLogin()" style="width:220px;padding:10px;background:white;color:black;border-radius:8px;">
        🔵 Continue with Google
    </button>

    <br><br>

    <input id="email" placeholder="Email" type="email"><br><br>
    <input id="password" placeholder="Password" type="password"><br><br>

    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
</div>

<!-- 💬 APP -->
<div id="app" style="display:none;">

    <h2>Ciphera</h2>

    <div style="text-align:center;">
        <button onclick="switchRoom()">🔄 Switch Room</button>
    </div>

    <div style="text-align:center;">
        <textarea id="inputText" placeholder="Type message..."></textarea><br>
        <button onclick="sendMessage()">Send</button>
    </div>

    <div class="chat-container" id="chatBox"></div>

</div>

<script>
/* ---------------- FIREBASE INIT ---------------- */
const firebaseConfig = {
  apiKey: "AIzaSyAqBq5P0It0bUcugEN6XxNM9DaO7JtFans",
  authDomain: "ciphera-1.firebaseapp.com",
  projectId: "ciphera-1",
  storageBucket: "ciphera-1.firebasestorage.app",
  messagingSenderId: "562339080162",
  appId: "1:562339080162:web:027e5fa3066dea8131bbbb",
  measurementId: "G-ZG2K9P4H8L"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* ---------------- GOOGLE LOGIN ---------------- */
function googleLogin() {
    const provider = new firebase.auth.GoogleAuthProvider();

    auth.signInWithPopup(provider)
        .then(res => console.log("Google login success"))
        .catch(err => alert(err.message));
}

/* ---------------- EMAIL AUTH ---------------- */
function signup() {
    auth.createUserWithEmailAndPassword(
        email.value,
        password.value
    ).catch(err => alert(err.message));
}

function login() {
    auth.signInWithEmailAndPassword(
        email.value,
        password.value
    ).catch(err => alert(err.message));
}

/* ---------------- AUTH STATE ---------------- */
let userId = null;

auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById("authBox").style.display = "none";
        document.getElementById("app").style.display = "block";

        userId = user.uid;

        initRoom();
    } else {
        document.getElementById("authBox").style.display = "block";
        document.getElementById("app").style.display = "none";

        userId = null;
    }
});

/* ---------------- ROOM SYSTEM ---------------- */
let roomId;
let roomKey;

function initRoom() {
    roomId = localStorage.getItem("roomId");

    if (!roomId) {
        roomId = prompt("Enter Room ID:");
        if (!roomId) return;
        localStorage.setItem("roomId", roomId);
    }

    roomKey = localStorage.getItem("roomKey_" + roomId);

    if (!roomKey) {
        roomKey = prompt("Enter Room Key:");
        if (!roomKey) return;
        localStorage.setItem("roomKey_" + roomId, roomKey);
    }

    listenMessages();
}

function switchRoom() {
    if (roomId) {
        localStorage.removeItem("roomKey_" + roomId);
    }
    localStorage.removeItem("roomId");
    location.reload();
}

/* ---------------- ENCRYPTION ---------------- */
function encrypt(text) {
    return CryptoJS.AES.encrypt(text, roomKey).toString();
}

/* ---------------- SEND ---------------- */
function sendMessage() {
    let text = document.getElementById("inputText").value;
    if (!text.trim()) return;

    db.collection("rooms")
      .doc(roomId)
      .collection("messages")
      .add({
          text: encrypt(text),
          sender: userId,
          time: Date.now()
      });

    document.getElementById("inputText").value = "";
}

/* ---------------- MESSAGE UI ---------------- */
function createMessage(cipher, type) {
    let div = document.createElement("div");
    div.className = "message " + type;

    div.innerHTML = `
        <div class="cipher">${cipher}</div>
        <input type="password" placeholder="Room Key">
        <button onclick="unlock(this)">Unlock</button>
        <div class="decoded"></div>
    `;

    document.getElementById("chatBox").appendChild(div);
}

/* ---------------- UNLOCK ---------------- */
function unlock(btn) {
    let parent = btn.parentElement;

    let key = parent.querySelector("input").value;
    let cipher = parent.querySelector(".cipher").innerText;

    let bytes = CryptoJS.AES.decrypt(cipher, key);
    let decoded = bytes.toString(CryptoJS.enc.Utf8);

    parent.querySelector(".decoded").innerText =
        decoded || " Wrong Key";
}

/* ---------------- REALTIME ---------------- */
function listenMessages() {
    db.collection("rooms")
      .doc(roomId)
      .collection("messages")
      .orderBy("time")
      .onSnapshot(snapshot => {

          document.getElementById("chatBox").innerHTML = "";

          snapshot.forEach(doc => {
              let data = doc.data();

              createMessage(
                  data.text,
                  data.sender === userId ? "sent" : "received"
              );
          });
      });
}
</script>

</body>
</html>
