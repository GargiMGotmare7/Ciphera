<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciphera | Stealth Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

    <style>
        :root {
            --bg: #020617;
            --sidebar: rgba(15, 23, 42, 0.6);
            --card: rgba(30, 41, 59, 0.4);
            --accent: #38bdf8;
            --secondary: #c084fc;
            --text: #f1f5f9;
            --glass-border: rgba(255, 255, 255, 0.1);
            --danger: #ef4444;
            --chat-bg: radial-gradient(circle at top right, #1e1b4b, #020617);
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* --- AUTH BOX --- */
        #authBox { width: 100%; max-width: 400px; margin: auto; padding: 20px; background: var(--card); border-radius: 20px; border: 1px solid var(--glass-border); text-align: center; }
        #authBox input { width: 90%; padding: 12px; margin: 10px 0; background: #0f172a; border: 1px solid var(--glass-border); color: white; border-radius: 10px; }

        #app { display: none; width: 100%; height: 100%; flex-direction: row; }

        /* --- SIDEBAR --- */
        .sidebar { width: 320px; background: var(--sidebar); backdrop-filter: blur(15px); border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; }
        .group-item { padding: 15px; margin: 5px 10px; border-radius: 12px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .group-item:hover { background: rgba(255,255,255,0.05); }
        .active-group { background: rgba(56, 189, 248, 0.1); border: 1px solid var(--accent); }

        /* --- MAIN CHAT --- */
        .main-chat { flex: 1; display: flex; flex-direction: column; background: var(--chat-bg); }
        .chat-header { padding: 15px 25px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        
        .message-wrapper { display: flex; flex-direction: column; margin-bottom: 15px; }
        .message { padding: 12px 18px; border-radius: 18px; max-width: 65%; position: relative; }
        .sent { margin-left: auto; background: var(--accent); color: #000; border-bottom-right-radius: 4px; }
        .received { margin-right: auto; background: #1e293b; border-bottom-left-radius: 4px; }
        
        .msg-meta { font-size: 10px; opacity: 0.6; margin-top: 4px; }

        /* --- CONTROLS --- */
        .input-area { padding: 20px; background: rgba(15, 23, 42, 0.8); display: flex; align-items: center; gap: 10px; }
        textarea { flex: 1; background: #0f172a; border: 1px solid var(--glass-border); color: white; border-radius: 15px; padding: 10px; resize: none; height: 40px; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #1e293b; padding: 25px; border-radius: 20px; width: 350px; }
        .unlock-pill { background: #334155; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="authBox">
    <h2>Ciphera</h2>
    <input id="email" placeholder="Email" type="email">
    <input id="password" placeholder="Password" type="password">
    <input id="username" placeholder="Pick a Username (Sign up only)" type="text">
    <div style="display: flex; gap: 10px; margin-top: 10px;">
        <button onclick="login()" style="flex: 1; background: var(--accent); padding: 14px; border-radius: 15px; border: none; cursor: pointer;">Login</button>
        <button onclick="signup()" style="flex: 1; background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 14px; border-radius: 15px; cursor: pointer;">Sign Up</button>
    </div>
</div>

<div id="app">
    <div class="sidebar">
        <div style="padding: 20px; border-bottom: 1px solid var(--glass-border);">
            <div id="profileBrief" style="display:flex; align-items:center; gap:10px;">
                <b id="myUsernameDisplay">User</b>
                <button onclick="openModal('settingsModal')" style="margin-left:auto; background:none; border:none; color:var(--accent); cursor:pointer;">⚙️</button>
            </div>
        </div>
        <div class="group-list" id="groupList">
            </div>
    </div>

    <div class="main-chat">
        <div id="chatInterface" style="display:flex; flex-direction: column; height: 100%;">
            <div class="chat-header">
                <div>
                    <b id="activeGroupName">Select Chat</b>
                </div>
                <div style="display:flex; gap:10px">
                    <button onclick="toggleSecretInput()" class="unlock-pill" id="lockStatusBtn">🔓 UNLOCK</button>
                    <button onclick="auth.signOut()" class="unlock-pill" style="background: var(--danger)">Logout</button>
                </div>
            </div>

            <div id="chatBox" class="chat-container"></div>
            <div id="typingArea" class="typing-indicator"></div>

            <div class="input-area">
                <textarea id="inputText" placeholder="Type a message..."></textarea>
                <button onclick="sendMessage()" style="background:var(--accent); border:none; padding:10px 20px; border-radius:15px; cursor:pointer;">Send</button>
            </div>
        </div>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>Settings</h3>
        <label>Theme Color:</label>
        <input type="color" id="themePicker" onchange="updateTheme(this.value)">
        <button onclick="closeModal('settingsModal')" style="width:100%; margin-top:20px; padding:10px;">Close</button>
    </div>
</div>

<script>
    // --- INITIALIZATION ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID",
        databaseURL: "YOUR_DB_URL"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const rdb = firebase.database();

    let userId, roomId, roomKey, isDecoded = false, allMessages = [];

    // --- AUTHENTICATION ---
    auth.onAuthStateChanged(user => {
        if (user) {
            userId = user.uid;
            document.getElementById("authBox").style.display = "none";
            document.getElementById("app").style.display = "flex";
            loadUserData();
            loadGroups();
        } else {
            document.getElementById("authBox").style.display = "block";
            document.getElementById("app").style.display = "none";
        }
    });

    async function signup() {
        const email = document.getElementById("email").value;
        const pass = document.getElementById("password").value;
        const user = document.getElementById("username").value;
        try {
            const res = await auth.createUserWithEmailAndPassword(email, pass);
            await db.collection("users").doc(res.user.uid).set({
                username: user,
                pfp: "https://ui-avatars.com/api/?name=" + user
            });
            alert("Account Created!");
        } catch(e) { alert(e.message); }
    }

    async function login() {
        const email = document.getElementById("email").value;
        const pass = document.getElementById("password").value;
        try {
            await auth.signInWithEmailAndPassword(email, pass);
        } catch(e) { alert(e.message); }
    }

    async function loadUserData() {
        const doc = await db.collection("users").doc(userId).get();
        if(doc.exists) document.getElementById("myUsernameDisplay").innerText = doc.data().username;
    }

    // --- GROUPS & MESSAGING ---
    function loadGroups() {
        db.collection("groups").onSnapshot(snap => {
            const list = document.getElementById("groupList");
            list.innerHTML = "";
            snap.forEach(doc => {
                const div = document.createElement("div");
                div.className = "group-item";
                div.innerText = doc.data().name;
                div.onclick = () => selectRoom(doc.id, doc.data().name);
                list.appendChild(div);
            });
        });
    }

    function selectRoom(id, name) {
        roomId = id;
        document.getElementById("activeGroupName").innerText = name;
        isDecoded = false;
        roomKey = null;
        document.getElementById("lockStatusBtn").innerText = "🔓 UNLOCK";
        listenForMessages();
    }

    function toggleSecretInput() {
        const key = prompt("Enter Room Encryption Key:");
        if(key) {
            roomKey = key;
            isDecoded = true;
            document.getElementById("lockStatusBtn").innerText = "🔒 LOCKED";
            renderAllMessages();
        }
    }

    function listenForMessages() {
        db.collection("groups").doc(roomId).collection("messages").orderBy("time", "asc")
            .onSnapshot(snap => {
                allMessages = [];
                snap.forEach(doc => allMessages.push({id: doc.id, ...doc.data()}));
                renderAllMessages();
            });
    }

    async function sendMessage() {
        const text = document.getElementById("inputText").value;
        if(!text || !roomId) return;

        let content = text;
        if(isDecoded && roomKey) {
            content = CryptoJS.AES.encrypt(text, roomKey).toString();
        }

        await db.collection("groups").doc(roomId).collection("messages").add({
            text: content,
            sender: userId,
            senderName: document.getElementById("myUsernameDisplay").innerText,
            time: Date.now(),
            isEncrypted: isDecoded
        });
        document.getElementById("inputText").value = "";
    }

    function renderAllMessages() {
        const chatBox = document.getElementById("chatBox");
        chatBox.innerHTML = "";
        allMessages.forEach(m => {
            const wrapper = document.createElement("div");
            wrapper.className = "message-wrapper";
            
            let content = "••••••••";
            if(m.isEncrypted) {
                if(isDecoded && roomKey) {
                    try {
                        const bytes = CryptoJS.AES.decrypt(m.text, roomKey);
                        content = bytes.toString(CryptoJS.enc.Utf8) || "[Decryption Failed]";
                    } catch(e) { content = "[Locked]"; }
                }
            } else {
                content = m.text;
            }

            const isMe = m.sender === userId;
            wrapper.innerHTML = `
                <div class="message ${isMe ? 'sent' : 'received'}">
                    <div>${content}</div>
                    <div class="msg-meta">
                        ${m.senderName} • ${new Date(m.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                    </div>
                </div>
            `;
            chatBox.appendChild(wrapper);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Modal Control
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function updateTheme(color) { document.documentElement.style.setProperty('--accent', color); }
</script>
</body>
</html>
