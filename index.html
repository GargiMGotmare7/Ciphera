<!DOCTYPE html>
<html>
<head>
    <title>Secret Chat</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        h2 {
            text-align: center;
        }

        .chat-container {
            width: 90%;
            max-width: 400px;
            margin: auto;
            margin-top: 20px;
        }

        .message {
            padding: 10px;
            border-radius: 15px;
            margin: 10px;
            max-width: 70%;
            position: relative;
        }

        .sent {
            background: #22c55e;
            color: black;
            margin-left: auto;
            text-align: right;
        }

        .received {
            background: #1e293b;
            text-align: left;
        }

        textarea {
            width: 80%;
            height: 60px;
            border-radius: 10px;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 8px 15px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            background: #38bdf8;
            margin: 5px;
        }

        input {
            border-radius: 8px;
            padding: 5px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<h2>🔐 Secret Chat</h2>

<div style="text-align:center;">
    <textarea id="inputText" placeholder="Type message..."></textarea><br>
    <button onclick="sendMessage()">Send</button>
    <button onclick="receiveMessage()">Fake Receive</button>
</div>

<div class="chat-container" id="chatBox"></div>

<script>
let secret = "1234";

function encode(text) {
    let encoded = "";
    for (let i = 0; i < text.length; i++) {
        encoded += String.fromCharCode(text.charCodeAt(i) + 5);
    }
    return encoded;
}

function decode(text) {
    let decoded = "";
    for (let i = 0; i < text.length; i++) {
        decoded += String.fromCharCode(text.charCodeAt(i) - 5);
    }
    return decoded;
}

function createMessage(text, type) {
    let encoded = encode(text);

    let msgDiv = document.createElement("div");
    msgDiv.className = "message " + type;

    msgDiv.innerHTML = `
        <p class="encoded">${encoded}</p>
        <input type="password" placeholder="Code">
        <button onclick="unlockMessage(this)">Unlock</button>
        <p class="decoded"></p>
    `;

    document.getElementById("chatBox").appendChild(msgDiv);
}

function sendMessage() {
    let text = document.getElementById("inputText").value;
    createMessage(text, "sent");
    document.getElementById("inputText").value = "";
}

function receiveMessage() {
    let fakeReplies = [
        "ok got it",
        "see you soon",
        "don’t tell anyone",
        "mission done",
        "call me later"
    ];

    let random = fakeReplies[Math.floor(Math.random() * fakeReplies.length)];
    createMessage(random, "received");
}

function unlockMessage(button) {
    let parent = button.parentElement;
    let pass = parent.querySelector("input").value;

    if (pass !== secret) {
        parent.querySelector(".decoded").innerText = "Wrong password";
        return;
    }

    let encoded = parent.querySelector(".encoded").innerText;
    let decoded = decode(encoded);

    let decodedEl = parent.querySelector(".decoded");
    decodedEl.innerText = decoded;

    setTimeout(() => {
        decodedEl.innerText = "";
    }, 4000);
}
</script>

</body>
</html>
