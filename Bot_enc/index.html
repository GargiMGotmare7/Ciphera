<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciphera | Stealth</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="hero">
        <div class="theme-picker">
            <div class="dot" style="background:#38bdf8" onclick="setTheme('blue')"></div>
            <div class="dot" style="background:#f472b6" onclick="setTheme('pink')"></div>
            <div class="dot" style="background:#4ade80" onclick="setTheme('green')"></div>
            <div class="dot" style="background:#fbbf24" onclick="setTheme('gold')"></div>
        </div>
        <div class="glow-sphere"></div>
        <div class="hero-content">
            <div class="badge">v1.2.0 Stealth Protocol</div>
            <h1>CIPHERA<span>.</span></h1>
            <p>End-to-end encrypted chats.<br>Your data stays in the shadows.</p>
            <button class="btn-primary" id="enterBtn">Enter the Void</button>
        </div>
    </section>

    <div id="authBox" style="display: none;">
        <h2>Ciphera</h2>
        <button class="btn-google" id="googleLoginBtn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="16"> Continue with Google
        </button>
        <div class="divider">OR</div>
        <input id="email" placeholder="Email" type="email">
        <input id="password" placeholder="Password" type="password">
        <button id="loginBtn" class="btn-main">Access Terminal</button>
        <div id="signupLink" class="sub-link">Join the Network</div>
    </div>

    <div id="app" style="display: none;">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>Chats</h3>
                <button id="openGroupModalBtn" class="btn-circle">+</button>
            </div>
            <div class="group-list" id="groupList"></div>
            <div class="uid-tag">UID: <span id="myUidDisplay">...</span></div>
        </div>

        <div class="main-chat">
            <div class="chat-header">
                <div>
                    <b id="activeGroupName">Select a chat</b><br>
                    <small id="roomDisplay" style="opacity:0.4; font-size:10px"></small>
                </div>
                <div class="header-btns">
                    <button id="unlockBtn">🔓 Unlock</button>
                    <button id="logoutBtn">Logout</button>
                </div>
            </div>

            <div id="lockerRoom" style="display:none;">
                <input id="masterKey" type="password" placeholder="Stealth Key...">
                <div class="locker-controls">
                    <button id="applyKeyBtn">Apply</button>
                    <button id="openFriendModalBtn">Add Member</button>
                </div>
            </div>

            <div class="chat-container" id="chatBox"></div>

            <div class="input-area">
                <textarea id="inputText" placeholder="Message..." rows="1"></textarea>
                <button id="sendBtn" class="btn-circle">➤</button>
            </div>
        </div>
    </div>

    <div id="groupModal" class="modal">
        <div class="modal-content">
            <h3>New Group</h3>
            <input id="newGroupName" placeholder="Group Name">
            <button id="confirmGroupBtn" class="btn-main">Create</button>
            <button class="close-modal" onclick="closeModal('groupModal')">Cancel</button>
        </div>
    </div>

    <div id="friendModal" class="modal">
        <div class="modal-content">
            <h3>Add Member</h3>
            <input id="friendUid" placeholder="Paste Friend UID">
            <button id="confirmFriendBtn" class="btn-main">Add</button>
            <button class="close-modal" onclick="closeModal('friendModal')">Cancel</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
