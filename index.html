<!DOCTYPE html>
<html>
<head>
    <title>Ciphera | Private</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        h2 { cursor: pointer; user-select: none; color: #38bdf8; transition: opacity 0.3s; }
        h2:active { opacity: 0.5; }

        .chat-container { width: 100%; max-width: 400px; height: 450px; overflow-y: auto; background: #020617; border-radius: 15px; padding: 10px; border: 1px solid #1e293b; margin-bottom: 15px; }

        .message { padding: 10px 15px; border-radius: 18px; margin: 8px; max-width: 70%; font-size: 0.9em; line-height: 1.4; word-wrap: break-word; }
        .sent { background: #0369a1; color: white; margin-left: auto; border-bottom-right-radius: 2px; }
        .received { background: #1e293b; color: #94a3b8; margin-right: auto; border-bottom-left-radius: 2px; }

        #lockerRoom { margin-bottom: 15px; transition: all 0.3s; }
        input, textarea { background: #1e293b; border: 1px solid #334155; color: white; padding: 10px; border-radius: 8px; outline: none; }
        
        textarea { width: 100%; max-width: 380px; height: 50px; resize: none; }
        
        .btn-send { background: #38bdf8; color: #020617; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; width: 100%; max-width: 400px; }

        #authBox { text-align: center; margin-top: 100px; }
        .version-tag { color: #1e293b; font-size: 0.7em; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="authBox">
    <h2>Ciphera</h2>
    <button onclick="googleLogin()" style="padding:10px; border-radius:8px; cursor:pointer;">🔵 Login with Google</button>
    <div style="margin-top:20px;">
        <input id="email" placeholder="Email" type="email"><br><br>
        <input id="password" placeholder="Password" type="password"><br><br>
        <button onclick="signup()">Sign Up</button>
        <button onclick="login()">Login</button>
    </div>
</div>

<div id="app" style="display:none; width: 100%; max-width: 400px;">
    
    <h2 onclick="toggleSecretInput()">Ciphera</h2>

    <div id="lockerRoom" style="display:none; text-align:center;">
        <input id="masterKey" type="password" placeholder="Code..." style="width: 60%;">
        <button onclick="applyKey()" style="padding: 9px; border-radius: 8px; background: #22c55e; border:none; cursor:pointer;">Apply</button>
    </div>

    <div class="chat-container" id="chatBox"></div>

    <div style="text-align:center;">
        <textarea id="inputText" placeholder="Enter message..."></textarea>
        <button class="btn-send" onclick="sendMessage()">Send</button>
        <div class="version-tag" onclick="switchRoom()">v1.0.4</div>
    </div>
</div>

<script>
/* ---------------- FIREBASE ---------------- */
const firebaseConfig = {
  apiKey: "AIzaSyAqBq5P0It0bUcugEN6XxNM9DaO7JtFans",
  authDomain: "ciphera-1.firebaseapp.com",
  projectId: "ciphera-1",
  storageBucket: "ciphera-1.firebasestorage.app",
  messagingSenderId: "562339080162",
  appId: "1:562339080162:web:027e5fa3066dea8131bbbb"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let userId = null;
let roomId = null;
let roomKey = null;      
let isDecoded = false;   
let allMessages = [];    

/* ---------------- AUTH LOGIC ---------------- */
function googleLogin() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
function signup() { auth.createUserWithEmailAndPassword(email.value, password.value); }
function login() { auth.signInWithEmailAndPassword(email.value, password.value); }

auth.onAuthStateChanged(user => {
    if (user) {
        userId = user.uid;
        document.getElementById("authBox").style.display = "none";
        document.getElementById("app").style.display = "block";
        initRoom();
    } else {
        document.getElementById("authBox").style.display = "block";
        document.getElementById("app").style.display = "none";
    }
});

/* ---------------- ROOM SYSTEM ---------------- */
function initRoom() {
    roomId = localStorage.getItem("roomId") || prompt("Room ID:");
    if (!roomId) return;
    localStorage.setItem("roomId", roomId);
    listenMessages();
}

function switchRoom() {
    localStorage.removeItem("roomId");
    location.reload();
}

/* ---------------- STEALTH LOGIC ---------------- */
function toggleSecretInput() {
    const box = document.getElementById("lockerRoom");
    // If we are already decoded, clicking the title re-locks it immediately
    if (isDecoded) {
        isDecoded = false;
        roomKey = null;
        document.getElementById("masterKey").value = "";
        renderAllMessages();
        box.style.display = "none";
    } else {
        box.style.display = (box.style.display === "none") ? "block" : "none";
    }
}

function applyKey() {
    const val = document.getElementById("masterKey").value;
    if (!val) return;
    roomKey = val;
    isDecoded = true;
    document.getElementById("lockerRoom").style.display = "none";
    renderAllMessages();
}

/* ---------------- MESSAGING ---------------- */
function renderAllMessages() {
    const chatBox = document.getElementById("chatBox");
    chatBox.innerHTML = "";

    allMessages.forEach(msg => {
        let div = document.createElement("div");
        div.className = "message " + (msg.sender === userId ? "sent" : "received");

        if (isDecoded) {
            try {
                const bytes = CryptoJS.AES.decrypt(msg.text, roomKey);
                const original = bytes.toString(CryptoJS.enc.Utf8);
                div.innerText = original || "???";
            } catch (e) { div.innerText = "???"; }
        } else {
            // The "Crazy Code" look
            div.style.opacity = "0.3";
            div.style.fontFamily = "monospace";
            div.innerText = msg.text.substring(0, 12) + "...";
        }
        chatBox.appendChild(div);
    });
    chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage() {
    // Safety check: Don't send if locked
    if (!isDecoded) {
        alert("System offline. (Unlock first)");
        return;
    }
    
    let text = document.getElementById("inputText").value;
    if (!text.trim()) return;

    db.collection("rooms").doc(roomId).collection("messages").add({
        text: CryptoJS.AES.encrypt(text, roomKey).toString(),
        sender: userId,
        time: Date.now()
    });
    document.getElementById("inputText").value = "";
}

function listenMessages() {
    db.collection("rooms").doc(roomId).collection("messages").orderBy("time", "asc")
      .onSnapshot(snapshot => {
          allMessages = [];
          snapshot.forEach(doc => allMessages.push(doc.data()));
          renderAllMessages();
      });
}
</script>
</body>
</html>
