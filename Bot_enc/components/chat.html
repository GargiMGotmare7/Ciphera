<div class="main-chat">
    <div id="placeholderUI">
        <h1 style="opacity: 0.1; font-size: 4rem; letter-spacing: 10px; margin: 0;">SELECT CHAT</h1>
        <p style="opacity: 0.3; font-size: 12px; margin-top: 10px;">End-to-end encrypted stealth portal</p>
    </div>

    <div id="chatInterface" style="display:none; flex-direction: column; height: 100%;">
        <div class="chat-header" style="display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <div id="statusDot" style="width: 10px; height: 10px; background: #808080; border-radius: 50%; transition: 0.3s;"></div>
                <div>
                    <b id="activeGroupName" style="font-size: 1.2rem;">Select Chat</b><br>
                    <small id="roomDisplay" style="opacity:0.4; font-size:9px"></small>
                    <small id="statusLabel" style="opacity:0.6; font-size:9px; margin-left: 4px;">Offline</small>
                </div>
            </div>
            <button onclick="toggleSecretInput()" class="unlock-pill" id="lockStatusBtn">🔓 UNLOCK</button>
        </div>

        <div id="lockerRoom" style="display:none; padding: 20px; background: rgba(0,0,0,0.3); text-align: center;">
            <input id="masterKey" type="password" placeholder="Stealth Key..." style="width:200px;">
            <button onclick="applyKey()" style="background:var(--accent); padding:10px;">Apply</button>
            <button onclick="openModal('friendModal')" style="background:var(--secondary); padding:10px;">Invite</button>
        </div>

        <div class="chat-container" id="chatBox"></div>

        <div id="replyBar" style="display:none;">
            <div id="replyPreviewText"></div>
            <button onclick="cancelReply()">✕</button>
        </div>

        <div class="input-area">
            <textarea id="inputText" placeholder="Type something secret..."></textarea>
            <button class="btn-circle" onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<script>
    (function() {
        const dot = document.getElementById('statusDot');
        const text = document.getElementById('statusLabel');

        // 1. Function to update the UI visuals
        function updateUI(isOnline) {
            if (isOnline) {
                dot.style.backgroundColor = "#2ecc71"; 
                dot.style.boxShadow = "0 0 8px #2ecc71";
                text.innerText = "Online";
                text.style.color = "#2ecc71";
            } else {
                dot.style.backgroundColor = "#7f8c8d"; 
                dot.style.boxShadow = "none";
                text.innerText = "Offline";
                text.style.color = "rgba(255,255,255,0.4)";
            }
        }

        // 2. Firebase Presence Logic
        // This monitors the connection and updates YOUR status in the DB
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                const myStatusRef = firebase.database().ref('status/' + user.uid);
                const connectedRef = firebase.database().ref('.info/connected');

                connectedRef.on('value', (snap) => {
                    if (snap.val() === true) {
                        // If I close the tab, set me to offline automatically
                        myStatusRef.onDisconnect().set({ state: 'offline' });
                        // Set me to online now
                        myStatusRef.set({ state: 'online' });
                    }
                });
            }
        });

        /** * 3. Monitoring the OTHER person 
         * Replace 'TARGET_USER_ID' with the actual ID of the person you are chatting with.
         * Usually, you would update this variable whenever you click a chat name.
         */
        function watchPartnerStatus(partnerId) {
            firebase.database().ref('status/' + partnerId).on('value', (snapshot) => {
                const data = snapshot.val();
                const isOnline = data && data.state === 'online';
                updateUI(isOnline);
            });
        }

        // Example: If you have a variable for the room/partner, call it like:
        // watchPartnerStatus('some-user-id');

    })();
</script>
