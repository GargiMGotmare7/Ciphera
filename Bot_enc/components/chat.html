<div class="main-chat">
    <div id="placeholderUI">
        <h1 style="opacity: 0.1; font-size: 4rem; letter-spacing: 10px; margin: 0;">SELECT CHAT</h1>
        <p style="opacity: 0.3; font-size: 12px; margin-top: 10px;">End-to-end encrypted stealth portal</p>
    </div>

    <div id="chatInterface" style="display:flex; flex-direction: column; height: 100%;">
        <div class="chat-header">
            <div>
                <b id="activeGroupName" style="font-size: 1.2rem;">Select Chat</b><br>
                <small id="roomDisplay" style="opacity:0.4; font-size:9px"></small>
            </div>
            <button onclick="toggleSecretInput()" class="unlock-pill" id="lockStatusBtn">🔓 UNLOCK</button>
        </div>

        <div id="lockerRoom" style="display:none; padding: 20px; background: rgba(0,0,0,0.3); text-align: center;">
            <input id="masterKey" type="password" placeholder="Stealth Key..." style="width:200px;">
            <button onclick="applyKey()" style="background:var(--accent); padding:10px;">Apply</button>
            <button onclick="openModal('friendModal')" style="background:var(--secondary); padding:10px;">Invite</button>
        </div>

        <div class="chat-container" id="chatBox" style="flex-grow: 1; overflow-y: auto; min-height: 300px; padding: 15px;">
            </div>

        <div id="replyBar" style="display:none;">
            <div id="replyPreviewText"></div>
            <button onclick="cancelReply()">✕</button>
        </div>

        <div class="input-area" style="display: flex; align-items: center; padding: 10px; background: rgba(255,255,255,0.05);">
            <textarea id="inputText" placeholder="Type something secret..." style="flex: 1; margin-right: 10px;"></textarea>
            
            <button id="micBtn" class="btn-circle" onclick="toggleRecording()" style="background: #444; border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; margin-right: 5px;">🎤</button>
            
            <button class="btn-circle" onclick="sendMessage()" style="background: var(--accent, #007bff); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer;">➤</button>
        </div>
    </div>
</div>

<script>
let mediaRecorder;
let audioChunks = [];
let isRecording = false;

async function toggleRecording() {
    const micBtn = document.getElementById('micBtn');
    
    if (!isRecording) {
        try {
            // Requesting Mic Access
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = (e) => {
                audioChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const audioUrl = URL.createObjectURL(audioBlob);
                
                // Display the voice message in the chat
                addAudioToChat(audioUrl);
                
                // Stop all tracks to turn off the hardware mic light
                stream.getTracks().forEach(track => track.stop());
            };

            mediaRecorder.start();
            isRecording = true;
            micBtn.style.background = "#ff4747"; // Turns red when recording
            micBtn.innerText = "🛑";
        } catch (err) {
            alert("Microphone error: Make sure you are using HTTPS and have granted permission.");
            console.error(err);
        }
    } else {
        mediaRecorder.stop();
        isRecording = false;
        micBtn.style.background = "#444";
        micBtn.innerText = "🎤";
    }
}

function addAudioToChat(url) {
    const chatBox = document.getElementById('chatBox');
    const wrapper = document.createElement('div');
    wrapper.style.cssText = "margin: 10px 0; text-align: right;";
    
    const audio = document.createElement('audio');
    audio.src = url;
    audio.controls = true;
    audio.style.cssText = "border-radius: 10px; max-width: 250px; background: #f1f1f1;";
    
    wrapper.appendChild(audio);
    chatBox.appendChild(wrapper);
    
    // Auto scroll to latest message
    chatBox.scrollTop = chatBox.scrollHeight;
}

// Your existing sendMessage function (modified slightly to ensure it works with the UI)
function sendMessage() {
    const input = document.getElementById('inputText');
    const chatBox = document.getElementById('chatBox');
    if (input.value.trim() !== "") {
        const msg = document.createElement('div');
        msg.style.cssText = "margin: 10px 0; text-align: right; background: rgba(255,255,255,0.1); padding: 8px; border-radius: 8px; display: inline-block; align-self: flex-end;";
        msg.innerText = input.value;
        
        const wrap = document.createElement('div');
        wrap.style.textAlign = "right";
        wrap.appendChild(msg);
        
        chatBox.appendChild(wrap);
        input.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;
    }
}

// Stubs for your other functions so the console doesn't error out
function toggleSecretInput() { console.log("Unlock clicked"); }
function applyKey() { console.log("Key applied"); }
function cancelReply() { console.log("Reply cancelled"); }
</script>
