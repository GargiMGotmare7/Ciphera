<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciphera | Portal</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>

    <style>
        :root {
            --bg: #020617;
            --sidebar: rgba(15, 23, 42, 0.6);
            --accent: #38bdf8;
            --secondary: #c084fc;
            --text: #f1f5f9;
            --glass-border: rgba(255, 255, 255, 0.1);
            --danger: #ef4444;
            --wa-sent: #005c4b;
            --wa-rcvd: #202c33;
        }

        * { box-sizing: border-box; transition: all 0.2s ease-in-out; }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #0b141a;
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #app { display: flex; width: 100%; height: 100%; }

        /* Sidebar Styling */
        .sidebar {
            width: 320px; background: #111b21; border-right: 1px solid var(--glass-border); 
            display: flex; flex-direction: column;
        }
        .sidebar-header { padding: 15px; background: #202c33; display: flex; justify-content: space-between; align-items: center; }
        .group-list { flex: 1; overflow-y: auto; padding: 10px; }
        .group-item {
            padding: 12px; margin-bottom: 5px; border-radius: 10px; cursor: pointer;
            display: flex; align-items: center; gap: 12px;
        }
        .group-item:hover { background: #2a3942; }
        .active-group { background: #2a3942; border-left: 4px solid var(--accent); }

        /* Main Chat Area */
        .main-chat { flex: 1; display: flex; flex-direction: column; position: relative; background-color: #0b141a; }
        .chat-header { 
            padding: 12px 25px; background: #202c33; border-bottom: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center; z-index: 10;
        }

        .chat-container { 
            flex: 1; overflow-y: auto; padding: 20px 40px; display: flex; flex-direction: column; 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay; background-opacity: 0.05;
        }

        /* WHATSAPP SLIM BUBBLES */
        .message { 
            position: relative; padding: 6px 10px 4px 12px; margin: 4px 0; 
            max-width: 70%; font-size: 0.92rem; line-height: 1.4;
            box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
            display: flex; flex-direction: column;
        }

        .sent { background: var(--wa-sent); align-self: flex-end; border-radius: 8px 0 8px 8px; }
        .received { background: var(--wa-rcvd); align-self: flex-start; border-radius: 0 8px 8px 8px; }

        .msg-sender-name { font-size: 0.75rem; font-weight: bold; color: var(--accent); margin-bottom: 2px; }

        /* STATUS DOTS - BOTTOM RIGHT */
        .msg-footer {
            display: flex; align-items: center; justify-content: flex-end;
            gap: 4px; margin-top: -2px; align-self: flex-end;
        }
        .status-dot { font-size: 14px; }
        .status-not-sent { color: rgba(255,255,255,0.3); } /* Hollow */
        .status-sent { color: rgba(255,255,255,0.5); }     /* Gray */
        .status-seen { color: var(--accent); text-shadow: 0 0 5px var(--accent); animation: pulse 2s infinite; } /* Blue Glow */

        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

        /* Actions hidden until hover */
        .msg-actions {
            position: absolute; top: 50%; transform: translateY(-50%); 
            display: flex; gap: 5px; opacity: 0; z-index: 5;
        }
        .sent .msg-actions { right: 105%; }
        .received .msg-actions { left: 105%; }
        .message:hover .msg-actions { opacity: 1; }
        
        .action-btn {
            width: 26px; height: 26px; border-radius: 50%; border: none; cursor: pointer;
            background: rgba(255,255,255,0.1); color: white; font-size: 11px;
        }

        /* Input Area */
        .input-area { padding: 15px; background: #202c33; display: flex; align-items: center; gap: 10px; }
        textarea { flex: 1; border-radius: 20px; padding: 10px 18px; background: #2a3942; border: none; color: white; outline: none; resize: none; max-height: 100px; }
        .btn-circle { background: var(--accent); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; }
        .modal-content { background: #232d36; padding: 25px; border-radius: 12px; width: 320px; border: 1px solid var(--glass-border); }

        #replyBar { display: none; padding: 10px 20px; background: #1e293b; border-bottom: 2px solid var(--accent); justify-content: space-between; }
        
        .reactions-container { display: flex; gap: 3px; margin-top: 4px; }
        .reaction-pill { background: rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 10px; font-size: 11px; cursor: pointer; }
        .reaction-pill.active { background: var(--accent); }
    </style>
</head>
<body>

<div id="app">
    <div class="sidebar">
        <div class="sidebar-header">
            <div style="display:flex; align-items:center; gap:10px; cursor:pointer;" onclick="openModal('profileModal')">
                <img id="myAvatar" src="" style="width:35px;height:35px;border-radius:50%; background: #ccc;">
                <b id="myNameDisplay">User</b>
            </div>
            <button onclick="openModal('groupModal')" style="background:none; border:none; color:var(--accent); font-size:20px; cursor:pointer;">+</button>
        </div>
        <div class="group-list" id="groupList"></div>
    </div>

    <div class="main-chat">
        <div id="placeholderUI" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; opacity:0.2;">
            <h1>CIPHERA</h1>
            <p>Select a portal to sync</p>
        </div>

        <div id="chatInterface" style="display:none; flex-direction: column; height: 100%;">
            <div class="chat-header">
                <div><b id="activeGroupName"></b><br><small id="roomDisplay" style="font-size:9px; opacity:0.5;"></small></div>
                <button onclick="toggleSecretInput()" id="lockStatusBtn" style="padding:6px 15px; border-radius:15px; background:var(--secondary); border:none; color:white; font-size:11px; cursor:pointer;">🔓 UNLOCK</button>
            </div>

            <div id="lockerRoom" style="display:none; padding: 15px; background: #111b21; text-align: center;">
                <input id="masterKey" type="password" placeholder="Master Key..." style="background:#2a3942; border:none; color:white; padding:10px; border-radius:8px;">
                <button onclick="applyKey()" style="background:var(--accent); border:none; color:white; padding:10px 20px; border-radius:8px; cursor:pointer;">Apply</button>
                <button onclick="openModal('friendModal')" style="background:var(--secondary); border:none; color:white; padding:10px 15px; border-radius:8px; margin-left:5px;">Invite</button>
            </div>

            <div class="chat-container" id="chatBox"></div>

            <div id="replyBar">
                <div id="replyPreviewText" style="font-size:12px; color:#aaa; overflow:hidden; white-space:nowrap;"></div>
                <button onclick="cancelReply()" style="background:none; border:none; color:var(--danger); cursor:pointer;">✕</button>
            </div>

            <div class="input-area">
                <textarea id="inputText" placeholder="Type a message..." rows="1"></textarea>
                <button class="btn-circle" id="sendBtn" onclick="handleSendAction()">➤</button>
            </div>
        </div>
    </div>
</div>

<div id="profileModal" class="modal"><div class="modal-content"><h3>Edit Profile</h3><input id="profUsername" placeholder="Username" style="width:100%;padding:10px;margin-bottom:10px;background:#2a3942;color:white;border:none;"><button onclick="saveProfile()" style="width:100%;padding:10px;background:var(--accent);border:none;color:white;cursor:pointer;">Save</button></div></div>
<div id="groupModal" class="modal"><div class="modal-content"><h3>New Chat</h3><input id="newGroupName" placeholder="Name..." style="width:100%;padding:10px;margin-bottom:10px;background:#2a3942;color:white;border:none;"><button onclick="createGroup()" style="width:100%;padding:10px;background:var(--accent);border:none;color:white;">Create</button></div></div>
<div id="friendModal" class="modal"><div class="modal-content"><h3>Invite Agent</h3><input id="friendUid" placeholder="UID..." style="width:100%;padding:10px;margin-bottom:10px;background:#2a3942;color:white;border:none;"><button onclick="addFriend()" style="width:100%;padding:10px;background:var(--secondary);border:none;color:white;">Add</button></div></div>
<div id="reactionModal" class="modal"><div class="modal-content" style="width:90%;"><emoji-picker id="fullEmojiPicker"></emoji-picker><button onclick="closeModal('reactionModal')" style="width:100%;padding:10px;margin-top:10px;">Close</button></div></div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyAqBq5P0It0bUcugEN6XxNM9DaO7JtFans", authDomain: "ciphera-1.firebaseapp.com", 
        projectId: "ciphera-1", storageBucket: "ciphera-1.firebasestorage.app", 
        messagingSenderId: "562339080162", appId: "1:562339080162:web:027e5fa3066dea8131bbbb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.firestore();

    let userId, roomId, roomKey, isDecoded = false, allMessages = [], unsubscribeMessages = null, replyingTo = null, editingMsgId = null, reactingToId = null;
    let currentUserProfile = { username: "User" };

    document.getElementById('fullEmojiPicker').addEventListener('emoji-click', e => addReaction(e.detail.unicode));

    auth.onAuthStateChanged(u => { if(u){ userId = u.uid; syncProfile(); loadGroups(); } else { window.location.href = "index.html"; } });

    async function syncProfile() {
        const doc = await db.collection("users").doc(userId).get();
        if(doc.exists) {
            currentUserProfile = doc.data();
            document.getElementById("myNameDisplay").innerText = currentUserProfile.username;
            document.getElementById("myAvatar").src = `https://ui-avatars.com/api/?name=${currentUserProfile.username}&background=random`;
        } else { openModal('profileModal'); }
    }

    async function saveProfile() {
        const name = document.getElementById("profUsername").value.trim();
        if(name) { await db.collection("users").doc(userId).set({username: name}, {merge:true}); closeModal('profileModal'); syncProfile(); }
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    async function createGroup() {
        const name = document.getElementById("newGroupName").value;
        if(name) { const g = await db.collection("groups").add({ name, members: [userId], createdAt: Date.now() }); closeModal('groupModal'); }
    }

    function loadGroups() {
        db.collection("groups").where("members", "array-contains", userId).onSnapshot(sn => {
            const list = document.getElementById("groupList"); list.innerHTML = "";
            sn.forEach(doc => {
                const div = document.createElement("div"); div.className = `group-item ${roomId === doc.id ? 'active-group' : ''}`;
                div.innerHTML = `<b>${doc.data().name}</b>`;
                div.onclick = () => { roomId = doc.id; document.getElementById("activeGroupName").innerText = doc.data().name; document.getElementById("placeholderUI").style.display="none"; document.getElementById("chatInterface").style.display="flex"; listenMessages(); };
                list.appendChild(div);
            });
        });
    }

    function toggleSecretInput() {
        if(isDecoded) { isDecoded = false; roomKey = null; document.getElementById("lockStatusBtn").innerText = "🔓 UNLOCK"; renderAllMessages(); }
        else { document.getElementById("lockerRoom").style.display = "block"; }
    }

    function applyKey() {
        roomKey = document.getElementById("masterKey").value;
        if(roomKey) { isDecoded = true; document.getElementById("lockerRoom").style.display = "none"; document.getElementById("lockStatusBtn").innerText = "🔓 UNLOCKED"; renderAllMessages(); }
    }

    async function markAsSeen(msgId, currentSeenBy) {
        if (currentSeenBy && !currentSeenBy.includes(userId)) {
            await db.collection("groups").doc(roomId).collection("messages").doc(msgId).update({ seenBy: firebase.firestore.FieldValue.arrayUnion(userId) });
        }
    }

    function renderAllMessages() {
        const chatBox = document.getElementById("chatBox"); chatBox.innerHTML = "";
        allMessages.forEach(m => {
            let d = document.createElement("div"); d.className = "message " + (m.sender === userId ? "sent" : "received");
            if (m.sender !== userId && isDecoded) markAsSeen(m.id, m.seenBy);

            let content;
            if(isDecoded) {
                try { const bytes = CryptoJS.AES.decrypt(m.text, roomKey); content = bytes.toString(CryptoJS.enc.Utf8) || "???"; } 
                catch (e) { content = "Encrypted"; }
            } else { content = "••••••••"; }

            let statusDot = "";
            if (m.sender === userId) {
                const seen = (m.seenBy || []).filter(id => id !== userId).length > 0;
                if (!m.id || m.metadata?.hasPendingWrites) statusDot = `<span class="status-dot status-not-sent">○</span>`;
                else if (seen) statusDot = `<span class="status-dot status-seen">●</span>`;
                else statusDot = `<span class="status-dot status-sent">●</span>`;
            }

            let actions = isDecoded ? `<div class="msg-actions">
                <button class="action-btn" onclick="openReaction('${m.id}')">☺</button>
                <button class="action-btn" onclick="setReply('${m.id}', '${m.text}')">⮪</button>
                ${m.sender === userId ? `<button class="action-btn" onclick="deleteMessage('${m.id}')">✕</button>` : ''}
            </div>` : "";

            let reactions = "";
            if(m.reactions && isDecoded) {
                reactions = `<div class="reactions-container">`;
                for(let e in m.reactions) if(m.reactions[e].length > 0) reactions += `<span class="reaction-pill ${m.reactions[e].includes(userId)?'active':''}" onclick="reactingToId='${m.id}'; addReaction('${e}')">${e} ${m.reactions[e].length}</span>`;
                reactions += `</div>`;
            }

            d.innerHTML = `
                ${m.sender !== userId ? `<span class="msg-sender-name">${m.senderName}</span>` : ''}
                <div>${content} ${m.edited ? `<small style="opacity:0.5; font-size:10px">(edited)</small>` : ''}</div>
                <div class="msg-footer">${statusDot}</div>
                ${reactions}${actions}
            `;
            chatBox.appendChild(d);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function handleSendAction() {
        const input = document.getElementById("inputText"); let txt = input.value.trim();
        if(!txt || !isDecoded) return;
        const msgData = { text: CryptoJS.AES.encrypt(txt, roomKey).toString(), sender: userId, senderName: currentUserProfile.username, time: Date.now(), seenBy: [userId], reactions: {} };
        await db.collection("groups").doc(roomId).collection("messages").add(msgData);
        input.value = "";
    }

    function setReply(id, enc) { replyingTo = {id, text: enc}; document.getElementById("replyBar").style.display = "flex"; document.getElementById("replyPreviewText").innerText = "Replying..."; }
    function cancelReply() { replyingTo = null; document.getElementById("replyBar").style.display = "none"; }
    function openReaction(id) { reactingToId = id; openModal('reactionModal'); }
    async function deleteMessage(id) { if(confirm("Delete?")) await db.collection("groups").doc(roomId).collection("messages").doc(id).delete(); }

    async function addReaction(emoji) {
        const ref = db.collection("groups").doc(roomId).collection("messages").doc(reactingToId);
        const d = await ref.get(); let r = d.data().reactions || {};
        if(!r[emoji]) r[emoji] = [];
        if(r[emoji].includes(userId)) r[emoji] = r[emoji].filter(u => u !== userId); else r[emoji].push(userId);
        await ref.update({reactions: r}); closeModal('reactionModal');
    }

    function listenMessages() {
        if(unsubscribeMessages) unsubscribeMessages();
        unsubscribeMessages = db.collection("groups").doc(roomId).collection("messages").orderBy("time", "asc").onSnapshot({ includeMetadataChanges: true }, sn => {
            allMessages = []; sn.forEach(doc => allMessages.push({ id: doc.id, metadata: doc.metadata, ...doc.data() })); renderAllMessages();
        });
    }
</script>
</body>
</html>
