<!DOCTYPE html>
<html>
<head>
    <title>Ciphera</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; margin: 0; padding: 20px; }
        h2 { text-align: center; color: #38bdf8; }
        
        /* Containers */
        .chat-container { width: 100%; max-width: 450px; margin: 20px auto; height: 400px; overflow-y: auto; border: 1px solid #1e293b; padding: 10px; border-radius: 10px; background: #020617; }
        .controls { max-width: 450px; margin: auto; text-align: center; background: #1e293b; padding: 15px; border-radius: 12px; border: 1px solid #334155; }

        /* Messages */
        .message { padding: 10px 15px; border-radius: 15px; margin: 8px; max-width: 75%; word-wrap: break-word; font-size: 0.95em; }
        .sent { background: #0369a1; color: white; margin-left: auto; border-bottom-right-radius: 2px; }
        .received { background: #334155; color: #cbd5e1; margin-right: auto; border-bottom-left-radius: 2px; }
        .cipher-text { opacity: 0.4; font-family: monospace; font-size: 0.8em; }

        /* Inputs & Buttons */
        input, textarea { width: 80%; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin: 5px 0; }
        button { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; margin: 5px; }
        .btn-unlock { background: #22c55e; color: white; }
        .btn-lock { background: #ef4444; color: white; }
        .btn-send { background: #38bdf8; color: black; width: 85%; }
        .btn-google { background: white; color: black; width: 220px; }
    </style>
</head>
<body>

<div id="app" style="display:none;">
    <h2 onclick="toggleSecretInput()" style="cursor: default; user-select: none;">Ciphera</h2>

    <div id="lockerRoom" style="display:none; text-align:center; margin-bottom: 10px;">
        <input id="masterKey" type="password" placeholder="..." style="width: 50%; height: 20px; font-size: 12px;">
        <button onclick="toggleGlobalLock()" style="padding: 5px 10px; font-size: 10px;">Apply</button>
    </div>

    <div class="chat-container" id="chatBox"></div>

    <div style="text-align:center; max-width: 450px; margin: auto;">
        <textarea id="inputText" placeholder="Type..."></textarea><br>
        <button class="btn-send" onclick="sendMessage()">Send</button>
        <br>
        <small onclick="switchRoom()" style="color: #334155; cursor: pointer;">v1.0.4</small>
    </div>
</div>

<script>
/* ---------------- CONFIG ---------------- */
const firebaseConfig = {
  apiKey: "AIzaSyAqBq5P0It0bUcugEN6XxNM9DaO7JtFans",
  authDomain: "ciphera-1.firebaseapp.com",
  projectId: "ciphera-1",
  storageBucket: "ciphera-1.firebasestorage.app",
  messagingSenderId: "562339080162",
  appId: "1:562339080162:web:027e5fa3066dea8131bbbb"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let userId = null;
let roomId = null;
let roomKey = null;      
let isDecoded = false;   
let allMessages = [];    

/* ---------------- AUTH ---------------- */
function googleLogin() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
function signup() { auth.createUserWithEmailAndPassword(email.value, password.value); }
function login() { auth.signInWithEmailAndPassword(email.value, password.value); }

auth.onAuthStateChanged(user => {
    if (user) {
        userId = user.uid;
        document.getElementById("authBox").style.display = "none";
        document.getElementById("app").style.display = "block";
        initRoom();
    } else {
        document.getElementById("authBox").style.display = "block";
        document.getElementById("app").style.display = "none";
    }
});

/* ---------------- ROOMS ---------------- */
function initRoom() {
    roomId = localStorage.getItem("roomId") || prompt("Room ID:");
    if (!roomId) return;
    localStorage.setItem("roomId", roomId);
    listenMessages();
}

/* ---------------- SECRET TOGGLES ---------------- */

// 1. Shows/Hides the password box when you click the "Ciphera" title
function toggleSecretInput() {
    const box = document.getElementById("lockerRoom");
    box.style.display = (box.style.display === "none") ? "block" : "none";
}

// 2. The actual logic to lock/unlock
function toggleGlobalLock() {
    const keyInput = document.getElementById("masterKey");
    
    if (!isDecoded) {
        if (!keyInput.value) return;
        roomKey = keyInput.value;
        isDecoded = true;
        // Hide the input again once unlocked to keep it clean
        document.getElementById("lockerRoom").style.display = "none";
    } else {
        isDecoded = false;
        roomKey = null;
        keyInput.value = "";
    }
    renderAllMessages();
}

/* ---------------- UI & FIREBASE ---------------- */
function renderAllMessages() {
    const chatBox = document.getElementById("chatBox");
    chatBox.innerHTML = "";
    allMessages.forEach(msg => {
        let div = document.createElement("div");
        div.className = "message " + (msg.sender === userId ? "sent" : "received");
        if (isDecoded) {
            try {
                const bytes = CryptoJS.AES.decrypt(msg.text, roomKey);
                div.innerText = bytes.toString(CryptoJS.enc.Utf8) || "???";
            } catch (e) { div.innerText = "???"; }
        } else {
            div.innerHTML = `<span class="cipher-text">${msg.text.substring(0, 15)}...</span>`;
        }
        chatBox.appendChild(div);
    });
    chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage() {
    if (!isDecoded) return; // Can't send while locked
    let text = document.getElementById("inputText").value;
    if (!text.trim()) return;
    db.collection("rooms").doc(roomId).collection("messages").add({
        text: CryptoJS.AES.encrypt(text, roomKey).toString(),
        sender: userId,
        time: Date.now()
    });
    document.getElementById("inputText").value = "";
}

function listenMessages() {
    db.collection("rooms").doc(roomId).collection("messages").orderBy("time", "asc")
      .onSnapshot(snapshot => {
          allMessages = [];
          snapshot.forEach(doc => allMessages.push(doc.data()));
          renderAllMessages();
      });
}

function switchRoom() {
    localStorage.removeItem("roomId");
    location.reload();
}
</script>

</body>
</html>
