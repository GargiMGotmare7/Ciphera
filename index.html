<!DOCTYPE html>
<html>
<head>
    <title>Ciphera | Stealth</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

    <style>
        :root {
            /* Default: Blue Theme */
            --bg: #020617;
            --card: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --secondary: #c084fc;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, var(--bg));
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background 0.5s ease;
        }

        /* 🎨 THEME PICKER STYLE */
        .theme-picker {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            transition: transform 0.2s;
        }
        .dot:hover { transform: scale(1.3); }

        /* ✨ AUTH BOX */
        #authBox {
            background: var(--card);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 320px;
            animation: fadeIn 0.8s ease-out;
        }

        h2 {
            font-size: 2.5rem;
            letter-spacing: -2px;
            margin: 10px 0 25px 0;
            background: linear-gradient(to right, var(--accent), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-main { background: var(--accent); color: #020617; }
        .btn-google { background: white; color: black; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 0.9em; }

        /* 💬 CHAT STYLES */
        #app { width: 95%; max-width: 450px; display: none; }
        .chat-container { height: 400px; overflow-y: auto; background: rgba(15, 23, 42, 0.8); border-radius: 20px; padding: 15px; margin: 15px 0; border: 1px solid rgba(255,255,255,0.05); }
        .message { padding: 12px 16px; border-radius: 18px; margin: 10px 0; max-width: 80%; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; }
        .sent { background: linear-gradient(135deg, var(--accent), var(--secondary)); margin-left: auto; color: white; border-bottom-right-radius: 4px; }
        .received { background: #334155; margin-right: auto; color: #e2e8f0; border-bottom-left-radius: 4px; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div id="authBox">
    <div class="theme-picker">
        <div class="dot" style="background:#38bdf8" onclick="setTheme('blue')"></div>
        <div class="dot" style="background:#f472b6" onclick="setTheme('pink')"></div>
        <div class="dot" style="background:#4ade80" onclick="setTheme('green')"></div>
        <div class="dot" style="background:#fbbf24" onclick="setTheme('gold')"></div>
    </div>
    
    <h2>Ciphera</h2>
    <button class="btn-google" onclick="googleLogin()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="16"> Continue with Google
    </button>
    
    <div style="margin: 15px 0; opacity: 0.3; font-size: 0.7rem;">OR LOGIN</div>
    
    <input id="email" placeholder="Email" type="email">
    <input id="password" placeholder="Password" type="password">
    <button class="btn-main" onclick="login()">Login</button>
    <div style="margin-top: 15px; font-size: 0.75rem; opacity: 0.5; cursor: pointer;" onclick="signup()">Create Account</div>
</div>

<div id="app">
    <h2 onclick="toggleSecretInput()">Ciphera</h2>

    <div id="lockerRoom" style="display:none; text-align:center;">
        <input id="masterKey" type="password" placeholder="Key..." style="width: 50%; text-align: center;">
        <button onclick="applyKey()" style="width: 80px; padding: 8px; background: var(--secondary); margin-left: 5px; color: white;">Unlock</button>
    </div>

    <div class="chat-container" id="chatBox"></div>

    <div style="text-align:center;">
        <textarea id="inputText" placeholder="Say something encrypted..." style="width:100%; border-radius: 15px; padding: 15px; background: #1e293b; color: white; border: 1px solid rgba(255,255,255,0.1); outline: none;"></textarea>
        <button class="btn-main" onclick="sendMessage()" style="width: 100%;">Send Message</button>
        <div style="font-size: 0.6rem; margin-top: 15px; opacity: 0.2; cursor: pointer;" onclick="switchRoom()">v1.0.5 • SWITCH ROOM</div>
    </div>
</div>

<script>
/* ---------------- THEMES ---------------- */
function setTheme(theme) {
    const root = document.documentElement;
    const themes = {
        blue: { accent: '#38bdf8', secondary: '#c084fc', bg: '#020617' },
        pink: { accent: '#f472b6', secondary: '#fb7185', bg: '#0f0505' },
        green: { accent: '#4ade80', secondary: '#2dd4bf', bg: '#050f05' },
        gold: { accent: '#fbbf24', secondary: '#f59e0b', bg: '#0f0a05' }
    };
    root.style.setProperty('--accent', themes[theme].accent);
    root.style.setProperty('--secondary', themes[theme].secondary);
    root.style.setProperty('--bg', themes[theme].bg);
    localStorage.setItem("preferredTheme", theme);
}

// Load saved theme
const savedTheme = localStorage.getItem("preferredTheme");
if (savedTheme) setTheme(savedTheme);

/* ---------------- FIREBASE CONFIG ---------------- */
const firebaseConfig = {
  apiKey: "AIzaSyAqBq5P0It0bUcugEN6XxNM9DaO7JtFans",
  authDomain: "ciphera-1.firebaseapp.com",
  projectId: "ciphera-1",
  storageBucket: "ciphera-1.firebasestorage.app",
  messagingSenderId: "562339080162",
  appId: "1:562339080162:web:027e5fa3066dea8131bbbb"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let userId, roomId, roomKey, isDecoded = false, allMessages = [];

/* ---------------- AUTH ---------------- */
function googleLogin() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
function signup() { auth.createUserWithEmailAndPassword(email.value, password.value); }
function login() { auth.signInWithEmailAndPassword(email.value, password.value); }

auth.onAuthStateChanged(user => {
    if (user) {
        userId = user.uid;
        document.getElementById("authBox").style.display = "none";
        document.getElementById("app").style.display = "block";
        initRoom();
    } else {
        document.getElementById("authBox").style.display = "block";
        document.getElementById("app").style.display = "none";
    }
});

/* ---------------- SYSTEM ---------------- */
function initRoom() {
    roomId = localStorage.getItem("roomId") || prompt("Join Room ID:");
    if (!roomId) return;
    localStorage.setItem("roomId", roomId);
    listenMessages();
}

function toggleSecretInput() {
    const box = document.getElementById("lockerRoom");
    if (isDecoded) {
        isDecoded = false; roomKey = null;
        renderAllMessages();
        box.style.display = "none";
    } else {
        box.style.display = (box.style.display === "none") ? "block" : "none";
    }
}

function applyKey() {
    roomKey = document.getElementById("masterKey").value;
    if (!roomKey) return;
    isDecoded = true;
    document.getElementById("lockerRoom").style.display = "none";
    renderAllMessages();
}

function renderAllMessages() {
    const chatBox = document.getElementById("chatBox");
    chatBox.innerHTML = "";
    allMessages.forEach(msg => {
        let div = document.createElement("div");
        div.className = "message " + (msg.sender === userId ? "sent" : "received");
        if (isDecoded) {
            try {
                const bytes = CryptoJS.AES.decrypt(msg.text, roomKey);
                div.innerText = bytes.toString(CryptoJS.enc.Utf8) || "???";
            } catch (e) { div.innerText = "???"; }
        } else {
            div.innerHTML = `<span style="opacity:0.3; font-family:monospace;">${msg.text.substring(0,12)}...</span>`;
        }
        chatBox.appendChild(div);
    });
    chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage() {
    if (!isDecoded) return alert("System Locked!");
    let text = document.getElementById("inputText").value;
    if (!text.trim()) return;
    db.collection("rooms").doc(roomId).collection("messages").add({
        text: CryptoJS.AES.encrypt(text, roomKey).toString(),
        sender: userId,
        time: Date.now()
    });
    document.getElementById("inputText").value = "";
}

function listenMessages() {
    db.collection("rooms").doc(roomId).collection("messages").orderBy("time", "asc")
      .onSnapshot(snapshot => {
          allMessages = [];
          snapshot.forEach(doc => allMessages.push(doc.data()));
          renderAllMessages();
      });
}

function switchRoom() { localStorage.removeItem("roomId"); location.reload(); }
</script>
</body>
</html>
