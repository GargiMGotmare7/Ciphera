<!DOCTYPE html>
<html>
<head>
    <title>Ciphera | Master</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

    <style>
        :root { --bg: #030712; --card: rgba(17, 24, 39, 0.8); --accent: #38bdf8; --secondary: #c084fc; --text: #f8fafc; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e1b4b, #030712); 
            color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden;
        }

        .glass { background: var(--card); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }

        #app { width: 95%; max-width: 480px; height: 92vh; display: none; flex-direction: column; animation: slideUp 0.6s ease; }

        /* 👤 HEADER */
        .profile-header { 
            display: flex; align-items: center; padding: 15px 20px; margin-bottom: 10px; gap: 12px; border-radius: 28px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .avatar-glow { 
            width: 45px; height: 45px; border-radius: 50%; object-fit: cover; 
            border: 2px solid var(--accent); box-shadow: 0 0 15px var(--accent); cursor: pointer;
        }

        /* 💬 CHAT AREA */
        .chat-container { 
            flex: 1; overflow-y: auto; padding: 15px; margin: 10px 0; border-radius: 28px;
            display: flex; flex-direction: column;
        }
        .msg-row { display: flex; align-items: flex-end; gap: 10px; margin-bottom: 15px; animation: pop 0.3s ease; }
        .msg-row.sent { flex-direction: row-reverse; }

        .bubble { 
            padding: 12px 16px; border-radius: 20px; font-size: 0.95rem; max-width: 70%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: relative; word-wrap: break-word;
        }
        .sent .bubble { background: linear-gradient(135deg, var(--accent), var(--secondary)); color: #000; border-bottom-right-radius: 4px; }
        .received .bubble { background: rgba(255,255,255,0.08); color: #fff; border-bottom-left-radius: 4px; }

        .chat-img { max-width: 100%; border-radius: 12px; margin-top: 5px; cursor: pointer; }
        .file-link { color: var(--accent); text-decoration: none; font-size: 0.8rem; display: block; margin-top: 5px; }

        /* ⌨️ INPUT */
        .input-bar { display: flex; align-items: center; padding: 8px 15px; border-radius: 40px; margin-bottom: 10px; }
        textarea { flex: 1; background: transparent; border: none; color: white; resize: none; outline: none; padding: 10px; height: 24px; }
        .btn-icon { background: none; border: none; color: var(--accent); cursor: pointer; padding: 5px; }
        .btn-send { background: var(--accent); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* 🛠 MODALS */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #111827; padding: 30px; border-radius: 32px; width: 85%; max-width: 350px; text-align: center; border: 1px solid var(--accent); }
        
        .crop-wrap { width: 120px; height: 120px; margin: 15px auto; border-radius: 50%; overflow: hidden; border: 3px solid var(--accent); }
        #cropPreview { width: 100%; height: 100%; object-fit: cover; }
        
        input[type="text"], input[type="password"], input[type="email"] { 
            width: 100%; padding: 12px; margin: 8px 0; background: rgba(255,255,255,0.05); border: 1px solid #334155; border-radius: 12px; color: white; box-sizing: border-box;
        }

        #loadingOverlay { display: none; position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); font-size: 0.7rem; color: var(--accent); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="authBox" class="glass" style="padding: 40px; text-align: center; width: 320px; border-radius: 32px;">
    <h2 style="font-size: 2.8rem; margin:0 0 20px 0; background: linear-gradient(to right, var(--accent), var(--secondary)); -webkit-background-clip: text; color: transparent;">Ciphera</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()" style="background:var(--accent); color:#000; border:none; padding:12px; border-radius:12px; width:100%; font-weight:bold; cursor:pointer;">Enter Vault</button>
</div>

<div id="app">
    <div class="profile-header glass">
        <img id="myAvatar" src="" class="avatar-glow" onclick="openProfile()">
        <div style="flex:1" onclick="openProfile()">
            <div id="myName" style="font-weight: bold;">User</div>
            <div id="roomInfo" style="font-size: 0.7rem; color: var(--accent);">Connected</div>
        </div>
        <div onclick="toggleSecret()" style="cursor:pointer; margin-right:15px;">🔑</div>
        <div onclick="logout()" style="cursor:pointer; opacity:0.6;">🚪</div>
    </div>

    <div id="lockerRoom" class="glass" style="display:none; text-align:center; padding: 15px; border-radius: 20px; margin-bottom: 10px;">
        <input id="masterKey" type="password" placeholder="Encryption Key" style="text-align: center;">
        <button onclick="applyKey()" style="background: var(--secondary); border:none; padding:8px 20px; border-radius:10px; color:white; cursor:pointer;">Unlock</button>
        <button onclick="nukeChat()" style="background: #ef4444; font-size: 0.6rem; border:none; padding:5px 10px; border-radius:8px; color:white; margin-top:10px; cursor:pointer;">☢️ NUKE ROOM</button>
    </div>

    <div class="chat-container glass" id="chatBox"></div>

    <div id="loadingOverlay">📤 Processing Encrypted File...</div>

    <div class="input-bar glass">
        <input type="file" id="fileInput" style="display:none;" onchange="uploadFile(this)">
        <button class="btn-icon" onclick="document.getElementById('fileInput').click()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
        </button>
        <textarea id="inputText" placeholder="Type a secret..." oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
        <button class="btn-send" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M2,21L23,12L2,3V10L17,12L2,14V21Z"></path></svg>
        </button>
    </div>
</div>

<div id="profileModal" class="modal">
    <div class="modal-content">
        <h3>Edit Profile</h3>
        <div class="crop-wrap">
            <img id="cropPreview" src="">
        </div>
        <input type="range" min="1" max="3" step="0.1" value="1" oninput="adjustZoom(this.value)" style="width:100%; accent-color:var(--accent);">
        <input id="editName" placeholder="Display Name">
        <input id="editPic" placeholder="Image URL" oninput="document.getElementById('cropPreview').src=this.value">
        <button onclick="saveProfile()" style="background:var(--accent); border:none; padding:12px; border-radius:12px; width:100%; font-weight:bold; cursor:pointer; margin-top:10px;">Save Profile</button>
        <button onclick="closeProfile()" style="background:transparent; color:white; border:none; margin-top:10px; cursor:pointer; opacity:0.5;">Cancel</button>
    </div>
</div>

<script>
/* --- CONFIG & INIT --- */
const firebaseConfig = { apiKey: "AIzaSyAqBq5P0It0bUcugEN6XxNM9DaO7JtFans", authDomain: "ciphera-1.firebaseapp.com", projectId: "ciphera-1", storageBucket: "ciphera-1.firebasestorage.app", messagingSenderId: "562339080162", appId: "1:562339080162:web:027e5fa3066dea8131bbbb" };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(); const db = firebase.firestore(); const storage = firebase.storage();

let userId, roomId, roomKey, allMessages = [], zoomLevel = 1, isDecoded = false;

/* --- AUTH --- */
auth.onAuthStateChanged(u => { 
    if(u){ 
        userId = u.uid; document.getElementById("authBox").style.display="none"; document.getElementById("app").style.display="flex"; 
        loadProfile(); initRoom();
    } else { document.getElementById("authBox").style.display="block"; document.getElementById("app").style.display="none"; }
});

/* --- PROFILE --- */
async function loadProfile() {
    const doc = await db.collection("users").doc(userId).get();
    if(doc.exists) {
        const d = doc.data();
        document.getElementById("myName").innerText = d.name;
        document.getElementById("myAvatar").src = d.pic || `https://ui-avatars.com/api/?name=${d.name}`;
        document.getElementById("myAvatar").style.transform = `scale(${d.zoom || 1})`;
    } else { openProfile(); }
}
function openProfile() { document.getElementById("profileModal").style.display="flex"; }
function closeProfile() { document.getElementById("profileModal").style.display="none"; }
function adjustZoom(v) { zoomLevel = v; document.getElementById("cropPreview").style.transform = `scale(${v})`; }
async function saveProfile() {
    const name = document.getElementById("editName").value;
    const pic = document.getElementById("editPic").value;
    await db.collection("users").doc(userId).set({ name, pic, zoom: zoomLevel });
    closeProfile(); loadProfile();
}

/* --- CHAT CORE --- */
function initRoom() { 
    roomId = localStorage.getItem("roomId") || prompt("Room ID:"); 
    localStorage.setItem("roomId", roomId); 
    document.getElementById("roomInfo").innerText = "Room: " + roomId;
    listenMessages(); 
}
function toggleSecret() { document.getElementById("lockerRoom").style.display = (document.getElementById("lockerRoom").style.display === "none") ? "block" : "none"; }
function applyKey() { roomKey = document.getElementById("masterKey").value; if(roomKey) { isDecoded = true; toggleSecret(); renderAllMessages(); } }

async function renderAllMessages() {
    const chatBox = document.getElementById("chatBox"); chatBox.innerHTML = "";
    for(const m of allMessages) {
        let isMe = m.sender === userId;
        const sDoc = await db.collection("users").doc(m.sender).get();
        const s = sDoc.data() || { name: "Guest", pic: "", zoom: 1 };
        
        let contentHtml = "";
        if(isDecoded) {
            try {
                const dec = CryptoJS.AES.decrypt(m.text, roomKey).toString(CryptoJS.enc.Utf8);
                if(m.type === 'image') contentHtml = `<img src="${dec}" class="chat-img" onclick="window.open('${dec}')">`;
                else if(m.type === 'file') contentHtml = `<a href="${dec}" target="_blank" class="file-link">📎 Encrypted File</a>`;
                else contentHtml = `<div>${dec}</div>`;
            } catch(e) { contentHtml = "<div>[Locked]</div>"; }
        } else { contentHtml = `<div style="opacity:0.2; font-family:monospace;">${m.text.substring(0,10)}...</div>`; }

        const row = document.createElement("div");
        row.className = `msg-row ${isMe ? 'sent' : 'received'}`;
        row.innerHTML = `
            <div style="width:30px; height:30px; border-radius:50%; overflow:hidden; border:1px solid var(--accent); flex-shrink:0;">
                <img src="${s.pic || 'https://ui-avatars.com/api/?name='+s.name}" style="width:100%; height:100%; object-fit:cover; transform:scale(${s.zoom || 1})">
            </div>
            <div class="bubble">${contentHtml}</div>
        `;
        chatBox.appendChild(row);
    }
    chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage() {
    if(!isDecoded) return alert("Unlock first!");
    let input = document.getElementById("inputText");
    if(!input.value.trim()) return;
    db.collection("rooms").doc(roomId).collection("messages").add({ 
        text: CryptoJS.AES.encrypt(input.value, roomKey).toString(), 
        type: 'text', sender: userId, time: Date.now() 
    });
    input.value = ""; input.style.height = "24px";
}

async function uploadFile(input) {
    if(!isDecoded) return alert("Unlock with Key first!");
    const file = input.files[0]; if(!file) return;
    document.getElementById("loadingOverlay").style.display = "block";
    const ref = storage.ref(`rooms/${roomId}/${Date.now()}_${file.name}`);
    try {
        await ref.put(file);
        const url = await ref.getDownloadURL();
        db.collection("rooms").doc(roomId).collection("messages").add({
            text: CryptoJS.AES.encrypt(url, roomKey).toString(),
            type: file.type.startsWith('image/') ? 'image' : 'file',
            sender: userId, time: Date.now()
        });
    } catch(e) { alert(e.message); }
    document.getElementById("loadingOverlay").style.display = "none";
}

function listenMessages() {
    db.collection("rooms").doc(roomId).collection("messages").orderBy("time", "asc").onSnapshot(sn => {
        allMessages = []; sn.forEach(doc => allMessages.push(doc.data())); renderAllMessages();
    });
}

function nukeChat() { if(confirm("☢️ ERASE ALL?")) db.collection("rooms").doc(roomId).collection("messages").get().then(sn => sn.forEach(d => d.ref.delete())); }
function login() { auth.signInWithEmailAndPassword(email.value, password.value).catch(e => alert(e.message)); }
function logout() { auth.signOut().then(() => location.reload()); }
</script>
</body>
</html>
