<!DOCTYPE html>
<html>
<head>
    <title>Ciphera</title>

    <!-- Firebase (correct order) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- CryptoJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        h2 { text-align: center; }

        .chat-container {
            width: 90%;
            max-width: 400px;
            margin: auto;
            margin-top: 20px;
        }

        .message {
            padding: 10px;
            border-radius: 15px;
            margin: 10px;
            max-width: 70%;
        }

        .sent {
            background: #22c55e;
            color: black;
            margin-left: auto;
            text-align: right;
        }

        .received {
            background: #1e293b;
        }

        textarea {
            width: 80%;
            height: 60px;
            border-radius: 10px;
            padding: 10px;
        }

        button {
            padding: 8px 15px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            background: #38bdf8;
            margin: 5px;
        }

        input {
            border-radius: 8px;
            padding: 5px;
            margin-top: 5px;
        }
    </style>
</head>

<body>

<!-- 🔐 AUTH SCREEN -->
<div id="authBox" style="text-align:center; margin-top:50px;">
    <h2>Ciphera Login</h2>

    <input id="email" placeholder="Email" type="email"><br><br>
    <input id="password" placeholder="Password" type="password"><br><br>

    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
</div>

<!-- 💬 APP SCREEN -->
<div id="app" style="display:none;">

    <h2>Ciphera</h2>

    <div style="text-align:center;">
        <button onclick="switchRoom()">🔄 Switch Room</button>
    </div>

    <div style="text-align:center;">
        <textarea id="inputText" placeholder="Type message..."></textarea><br>
        <button onclick="sendMessage()">Send</button>
    </div>

    <div class="chat-container" id="chatBox"></div>

</div>

<script>
/* ---------------- FIREBASE ---------------- */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "ciphera-1.firebaseapp.com",
  projectId: "ciphera-1",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

/* ---------------- AUTH ---------------- */
function signup() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, password)
        .catch(err => alert(err.message));
}

function login() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
        .catch(err => alert(err.message));
}

let userId = null;

/* ---------------- AUTH STATE ---------------- */
auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById("authBox").style.display = "none";
        document.getElementById("app").style.display = "block";

        userId = user.uid;

        initRoom();   // start chat only after login
    } else {
        document.getElementById("authBox").style.display = "block";
        document.getElementById("app").style.display = "none";

        userId = null;
    }
});

/* ---------------- ROOM SYSTEM ---------------- */
let roomId;
let roomKey;

function initRoom() {
    roomId = localStorage.getItem("roomId");

    if (!roomId) {
        roomId = prompt("Enter Room ID:");
        localStorage.setItem("roomId", roomId);
    }

    roomKey = localStorage.getItem("roomKey_" + roomId);

    if (!roomKey) {
        roomKey = prompt("Enter Room Key:");
        localStorage.setItem("roomKey_" + roomId, roomKey);
    }

    listenMessages();
}

function switchRoom() {
    localStorage.removeItem("roomKey_" + roomId);
    localStorage.removeItem("roomId");
    location.reload();
}

/* ---------------- ENCRYPTION ---------------- */
function encrypt(text) {
    return CryptoJS.AES.encrypt(text, roomKey).toString();
}

function decrypt(cipher) {
    let bytes = CryptoJS.AES.decrypt(cipher, roomKey);
    return bytes.toString(CryptoJS.enc.Utf8);
}

/* ---------------- SEND MESSAGE ---------------- */
function sendMessage() {
    if (!userId) return;

    let text = document.getElementById("inputText").value;
    if (!text.trim()) return;

    let encrypted = encrypt(text);

    db.collection("rooms")
      .doc(roomId)
      .collection("messages")
      .add({
          text: encrypted,
          sender: userId,
          time: Date.now()
      });

    document.getElementById("inputText").value = "";
}

/* ---------------- RECEIVE UI ---------------- */
function createMessage(text, type) {
    let div = document.createElement("div");
    div.className = "message " + type;

    div.innerHTML = `
        <div>${text}</div>
        <input type="password" placeholder="Room Key">
        <button onclick="unlock(this)">Unlock</button>
        <div class="decoded"></div>
    `;

    document.getElementById("chatBox").appendChild(div);
}

function unlock(btn) {
    let parent = btn.parentElement;

    let key = parent.querySelector("input").value;
    let cipher = parent.querySelector("div").innerText;

    let bytes = CryptoJS.AES.decrypt(cipher, key);
    let decoded = bytes.toString(CryptoJS.enc.Utf8);

    parent.querySelector(".decoded").innerText =
        decoded || "❌ Wrong Key";
}

/* ---------------- REALTIME LISTENER ---------------- */
function listenMessages() {
    db.collection("rooms")
      .doc(roomId)
      .collection("messages")
      .orderBy("time")
      .onSnapshot(snapshot => {

          document.getElementById("chatBox").innerHTML = "";

          snapshot.forEach(doc => {
              let data = doc.data();

              let decrypted = decrypt(data.text);

              createMessage(
                  decrypted,
                  data.sender === userId ? "sent" : "received"
              );
          });
      });
}
</script>

</body>
</html>
