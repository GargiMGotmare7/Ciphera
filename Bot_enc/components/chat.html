<div class="input-area">
    <textarea id="inputText" placeholder="Type something secret..."></textarea>
    <button id="sendBtn" class="btn-circle" onclick="handleSend()">➤</button>
</div>

<script>
    // 2. Track the state
    let isEditing = false;
    let editingMessageId = null;

    // 3. This function replaces your old sendMessage logic
    function handleSend() {
        const text = document.getElementById('inputText').value;
        if (!text.trim()) return;

        if (isEditing) {
            saveEdit(editingMessageId, text);
        } else {
            sendMessage(text);
        }
    }

    // 4. Function to enter "Edit Mode"
    // Call this when the user clicks 'Edit' on a message
    function enterEditMode(messageId, currentText) {
        isEditing = true;
        editingMessageId = messageId;
        
        const input = document.getElementById('inputText');
        const btn = document.getElementById('sendBtn');
        
        input.value = currentText; // Put text back in box
        input.focus();
        btn.innerText = "✓"; // Change icon to a checkmark
        input.style.border = "1px solid var(--accent)"; // Visual cue
    }

    // 5. Function to save the changes
    function saveEdit(id, newText) {
        console.log("Updating message " + id + " to: " + newText);
        
        // --- YOUR BACKEND/ARRAY LOGIC HERE ---
        // Example: updateMessageInDatabase(id, newText);
        
        exitEditMode();
    }

    function exitEditMode() {
        isEditing = false;
        editingMessageId = null;
        
        const input = document.getElementById('inputText');
        const btn = document.getElementById('sendBtn');
        
        input.value = "";
        btn.innerText = "➤";
        input.style.border = "none";
    }

            </div>
        `;
    }
    */
</script>
