<!DOCTYPE html>
<html>
<head>
    <title>Ciphera</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- 🔐 CryptoJS for real encryption -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        h2 { text-align: center; }

        .chat-container {
            width: 90%;
            max-width: 400px;
            margin: auto;
            margin-top: 20px;
        }

        .message {
            padding: 10px;
            border-radius: 15px;
            margin: 10px;
            max-width: 70%;
        }

        .sent {
            background: #22c55e;
            color: black;
            margin-left: auto;
            text-align: right;
        }

        .received {
            background: #1e293b;
        }

        textarea {
            width: 80%;
            height: 60px;
            border-radius: 10px;
            padding: 10px;
        }

        button {
            padding: 8px 15px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            background: #38bdf8;
        }

        input {
            border-radius: 8px;
            padding: 5px;
            margin-top: 5px;
        }
    </style>
</head>

<body>

<h2>Ciphera</h2>

<div style="text-align:center;">
    <textarea id="inputText" placeholder="Type message..."></textarea><br>
    <button onclick="sendMessage()">Send</button>
</div>

<div class="chat-container" id="chatBox"></div>

<script>
/* ---------------- FIREBASE ---------------- */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "ciphera-1.firebaseapp.com",
  projectId: "ciphera-1",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ---------------- USER + ROOM ---------------- */
let roomId = localStorage.getItem("roomId");
if (!roomId) {
    roomId = prompt("Enter Room ID:");
    localStorage.setItem("roomId", roomId);
}

let roomKey = localStorage.getItem("roomKey_" + roomId);
if (!roomKey) {
    roomKey = prompt("Enter Secret Room Key:");
    localStorage.setItem("roomKey_" + roomId, roomKey);
}

let userId = localStorage.getItem("userId");
if (!userId) {
    userId = "user_" + Math.random().toString(36).substr(2, 9);
    localStorage.setItem("userId", userId);
}

/* ---------------- ENCRYPT / DECRYPT ---------------- */
function encrypt(text) {
    return CryptoJS.AES.encrypt(text, roomKey).toString();
}

function decrypt(cipher) {
    try {
        let bytes = CryptoJS.AES.decrypt(cipher, roomKey);
        return bytes.toString(CryptoJS.enc.Utf8) || "Wrong Key";
    } catch {
        return "Error";
    }
}

/* ---------------- UI MESSAGE ---------------- */
function createMessage(text, type, encrypted = false) {
    let div = document.createElement("div");
    div.className = "message " + type;

    if (encrypted) {
        div.innerHTML = `
            <div class="cipher">${text}</div>
            <input type="password" placeholder="Room Key">
            <button onclick="unlock(this)">Unlock</button>
            <div class="decoded"></div>
        `;
    } else {
        div.innerHTML = `<div>${text}</div>`;
    }

    document.getElementById("chatBox").appendChild(div);
}

/* ---------------- SEND ---------------- */
function sendMessage() {
    let text = document.getElementById("inputText").value;
    if (!text.trim()) return;

    let encrypted = encrypt(text);

    db.collection("rooms")
      .doc(roomId)
      .collection("messages")
      .add({
          text: encrypted,
          sender: userId,
          time: Date.now()
      });

    document.getElementById("inputText").value = "";
}

/* ---------------- UNLOCK ---------------- */
function unlock(btn) {
    let parent = btn.parentElement;
    let key = parent.querySelector("input").value;

    let cipher = parent.querySelector(".cipher").innerText;

    let bytes = CryptoJS.AES.decrypt(cipher, key);
    let decoded = bytes.toString(CryptoJS.enc.Utf8);

    parent.querySelector(".decoded").innerText =
        decoded || "Incorrect Key";
}

/* ---------------- REALTIME LISTENER ---------------- */
db.collection("rooms")
  .doc(roomId)
  .collection("messages")
  .orderBy("time")
  .onSnapshot(snapshot => {
      document.getElementById("chatBox").innerHTML = "";

      snapshot.forEach(doc => {
          let data = doc.data();

          createMessage(
              data.text,
              data.sender === userId ? "sent" : "received",
              true
          );
      });
  });

</script>

</body>
</html>
