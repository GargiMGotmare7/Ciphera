<div class="main-chat">
    <div id="placeholderUI">
        <h1 style="opacity: 0.1; font-size: 4rem; letter-spacing: 10px; margin: 0;">SELECT CHAT</h1>
        <p style="opacity: 0.3; font-size: 12px; margin-top: 10px;">End-to-end encrypted stealth portal</p>
    </div>

    <div id="chatInterface" style="display:flex; flex-direction: column; height: 100%;">
        <div class="chat-header">
            <div>
                <b id="activeGroupName" style="font-size: 1.2rem;">Select Chat</b><br>
                <small id="roomDisplay" style="opacity:0.4; font-size:9px"></small>
            </div>
            <button onclick="toggleSecretInput()" class="unlock-pill" id="lockStatusBtn">🔓 UNLOCK</button>
        </div>

        <div id="lockerRoom" style="display:none; padding: 20px; background: rgba(0,0,0,0.3); text-align: center;">
            <input id="masterKey" type="password" placeholder="Stealth Key..." style="width:200px;">
            <button onclick="applyKey()" style="background:var(--accent); padding:10px;">Apply</button>
            <button onclick="openModal('friendModal')" style="background:var(--secondary); padding:10px;">Invite</button>
        </div>

        <div class="chat-container" id="chatBox" style="flex-grow: 1; overflow-y: auto; padding: 10px;"></div>

        <div id="replyBar" style="display:none;">
            <div id="replyPreviewText"></div>
            <button onclick="cancelReply()">✕</button>
        </div>

        <div class="input-area" style="display: flex; align-items: center; padding: 10px; gap: 8px;">
            <textarea id="inputText" placeholder="Type something secret..." style="flex-grow: 1;"></textarea>
            
            <button id="micBtn" class="btn-circle" onclick="toggleRecording()" style="background: #444; border:none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; transition: 0.3s;">🎤</button>
            
            <button class="btn-circle" onclick="sendMessage()" style="border:none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer;">➤</button>
        </div>
    </div>
</div>

<script>
    // --- Voice Messaging Logic ---
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    async function toggleRecording() {
        const micBtn = document.getElementById('micBtn');
        
        if (!isRecording) {
            try {
                // Request microphone access
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    appendVoiceMessage(audioUrl);
                };

                mediaRecorder.start();
                isRecording = true;
                micBtn.style.background = "#ff4444"; // Red for recording
                micBtn.innerText = "🛑";
            } catch (err) {
                console.error("Mic error:", err);
                alert("Microphone access is required for voice messages.");
            }
        } else {
            mediaRecorder.stop();
            isRecording = false;
            micBtn.style.background = "#444";
            micBtn.innerText = "🎤";
            
            // Stop the microphone stream to release the hardware
            mediaRecorder.stream.getTracks().forEach(track => track.stop());
        }
    }

    function appendVoiceMessage(url) {
        const chatBox = document.getElementById('chatBox');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message sent'; // Adapts to your CSS classes
        msgDiv.style.margin = "10px 0";
        msgDiv.style.textAlign = "right";

        const audio = document.createElement('audio');
        audio.src = url;
        audio.controls = true;
        audio.style.display = "block";
        audio.style.marginLeft = "auto";
        audio.style.borderRadius = "20px";
        audio.style.maxHeight = "35px";

        msgDiv.appendChild(audio);
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // --- Placeholder for your existing functions ---
    function sendMessage() {
        const input = document.getElementById('inputText');
        if(input.value.trim() === "") return;
        
        const chatBox = document.getElementById('chatBox');
        const msg = document.createElement('div');
        msg.innerText = input.value;
        msg.style.textAlign = "right";
        msg.style.padding = "10px";
        chatBox.appendChild(msg);
        
        input.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function toggleSecretInput() { /* Your existing code here */ }
    function applyKey() { /* Your existing code here */ }
    function cancelReply() { /* Your existing code here */ }
</script>
