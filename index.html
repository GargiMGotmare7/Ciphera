<!DOCTYPE html>
<html>
<head>
<title>Ciphera</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
}

h2{text-align:center;}

.chat-container{
width:90%;
max-width:400px;
margin:auto;
margin-top:20px;
}

.message{
padding:10px;
border-radius:15px;
margin:10px;
max-width:70%;
}

.sent{
background:#22c55e;
color:black;
margin-left:auto;
text-align:right;
}

.received{
background:#1e293b;
}

.time{
font-size:11px;
opacity:.7;
margin-top:4px;
}

textarea{
width:80%;
height:60px;
border-radius:10px;
padding:10px;
}

button{
padding:8px 15px;
border-radius:10px;
border:none;
cursor:pointer;
background:#38bdf8;
margin:5px;
}

input{
border-radius:8px;
padding:5px;
margin-top:5px;
}

</style>
</head>

<body>

<div id="authBox" style="text-align:center;margin-top:50px;">

<h2>Ciphera Login</h2>

<button onclick="googleLogin()" style="width:220px;padding:10px;background:white;color:black;border-radius:8px;">
Continue with Google
</button>

<br><br>

<input id="email" placeholder="Email" type="email"><br><br>
<input id="password" placeholder="Password" type="password"><br><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

</div>


<div id="app" style="display:none;">

<h2>Ciphera</h2>

<div style="text-align:center;">
<button onclick="switchRoom()">Switch Room</button>
</div>

<div style="text-align:center;">
<textarea id="inputText" placeholder="Type message..."></textarea><br>
<button onclick="sendMessage()">Send</button>
</div>

<div class="chat-container" id="chatBox"></div>

</div>


<script>

const firebaseConfig = {
  apiKey: "AIzaSyAqBq5P0It0bUcugEN6XxNM9DaO7JtFans",
  authDomain: "ciphera-1.firebaseapp.com",
  projectId: "ciphera-1",
  storageBucket: "ciphera-1.firebasestorage.app",
  messagingSenderId: "562339080162",
  appId: "1:562339080162:web:027e5fa3066dea8131bbbb",
  measurementId: "G-ZG2K9P4H8L"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();


function googleLogin(){

const provider = new firebase.auth.GoogleAuthProvider();

auth.signInWithPopup(provider)
.catch(err=>alert(err.message));

}


function signup(){

auth.createUserWithEmailAndPassword(
email.value,
password.value
).catch(err=>alert(err.message));

}

function login(){

auth.signInWithEmailAndPassword(
email.value,
password.value
).catch(err=>alert(err.message));

}


let userId=null;
let roomId;
let roomKey;


auth.onAuthStateChanged(user=>{

if(user){

document.getElementById("authBox").style.display="none";
document.getElementById("app").style.display="block";

userId=user.uid;

initRoom();

}else{

document.getElementById("authBox").style.display="block";
document.getElementById("app").style.display="none";

}

});


function initRoom(){

roomId=localStorage.getItem("roomId");

if(!roomId){

roomId=prompt("Enter Room ID:");
if(!roomId)return;

localStorage.setItem("roomId",roomId);

}

roomKey=localStorage.getItem("roomKey_"+roomId);

if(!roomKey){

roomKey=prompt("Enter Room Key:");
if(!roomKey)return;

localStorage.setItem("roomKey_"+roomId,roomKey);

}

listenMessages();

}


function switchRoom(){

localStorage.removeItem("roomKey_"+roomId);
localStorage.removeItem("roomId");

location.reload();

}


function encrypt(text){

return CryptoJS.AES.encrypt(text,roomKey).toString();

}


function decrypt(cipher){

try{

let bytes=CryptoJS.AES.decrypt(cipher,roomKey);
let decoded=bytes.toString(CryptoJS.enc.Utf8);

return decoded;

}catch{

return null;

}

}


function sendMessage(){

let text=document.getElementById("inputText").value;

if(!text.trim())return;

db.collection("rooms")
.doc(roomId)
.collection("messages")
.add({

text:encrypt(text),
sender:userId,
time:Date.now()

});

document.getElementById("inputText").value="";

}


function createMessage(cipher,type,time){

let decrypted=decrypt(cipher);

let div=document.createElement("div");
div.className="message "+type;

div.innerHTML=`
<div>${decrypted || "Unable to decrypt"}</div>
<div class="time">${new Date(time).toLocaleTimeString()}</div>
`;

document.getElementById("chatBox").appendChild(div);

}


function listenMessages(){

db.collection("rooms")
.doc(roomId)
.collection("messages")
.orderBy("time")
.onSnapshot(snapshot=>{

document.getElementById("chatBox").innerHTML="";

snapshot.forEach(doc=>{

let data=doc.data();

createMessage(
data.text,
data.sender===userId?"sent":"received",
data.time
);

});

});

}


document.getElementById("inputText").addEventListener("keydown",function(e){

if(e.key==="Enter"&&!e.shiftKey){

e.preventDefault();
sendMessage();

}

});

</script>

</body>
</html>
