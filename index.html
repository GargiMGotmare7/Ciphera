<!DOCTYPE html>
<html>
<head>
    <title>Ciphera | Stealth</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

    <style>
        :root {
            --bg: #020617;
            --sidebar: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --secondary: #c084fc;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- AUTH BOX --- */
        #authBox {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--card); backdrop-filter: blur(12px);
            padding: 40px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; width: 320px; z-index: 100;
        }

        .forgot-link {
            display: block;
            margin-top: 15px;
            font-size: 0.8rem;
            color: var(--accent);
            text-decoration: none;
            opacity: 0.8;
            transition: 0.3s;
        }
        .forgot-link:hover { opacity: 1; text-decoration: underline; }

        /* --- MAIN LAYOUT --- */
        #app { display: none; width: 100%; height: 100%; flex-direction: row; }

        .sidebar {
            width: 350px;
            background: var(--sidebar);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .group-list { flex: 1; overflow-y: auto; padding: 10px; }
        
        .group-item {
            padding: 15px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .group-item:hover { background: rgba(255,255,255,0.05); }
        .active-group { background: rgba(56, 189, 248, 0.15); border-color: var(--accent); }

        .main-chat { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at top right, #1e1b4b, var(--bg)); }
        
        .chat-header { padding: 15px 25px; background: rgba(15, 23, 42, 0.8); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }

        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }

        .message { padding: 12px 16px; border-radius: 18px; margin: 8px 0; max-width: 70%; font-size: 0.9rem; position: relative; }
        .sent { background: linear-gradient(135deg, var(--accent), var(--secondary)); margin-left: auto; color: white; border-bottom-right-radius: 4px; }
        .received { background: #1e293b; margin-right: auto; color: #e2e8f0; border-bottom-left-radius: 4px; }

        .input-area { padding: 20px; background: rgba(15, 23, 42, 0.9); display: flex; align-items: center; gap: 10px; }
        textarea { flex: 1; background: #1e293b; border: 1px solid #334155; border-radius: 20px; color: white; padding: 12px 20px; resize: none; outline: none; height: 20px; }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center;
        }
        .modal-content { background: var(--sidebar); padding: 30px; border-radius: 20px; width: 300px; border: 1px solid var(--accent); }

        .btn-circle { background: var(--accent); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #1e293b; border: 1px solid #334155; border-radius: 10px; color: white; box-sizing: border-box; }
        
        /* New helper for auth buttons */
        .auth-buttons { display: flex; gap: 10px; margin-top: 5px; }
    </style>
</head>
<body>

<div id="authBox">
    <h2>Ciphera</h2>
    <input id="email" placeholder="Email" type="email">
    <input id="password" placeholder="Password" type="password">
    
    <div class="auth-buttons">
        <button onclick="login()" style="flex: 1; background: var(--accent); color: var(--bg); padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer;">Login</button>
        <button onclick="signup()" style="flex: 1; background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer;">Sign Up</button>
    </div>
    
    <a href="javascript:void(0)" class="forgot-link" onclick="forgotPassword()">Forgot Password?</a>
</div>

<div id="app">
    <div class="sidebar">
        <div class="sidebar-header">
            <h3 style="margin:0; color:var(--accent)">Chats</h3>
            <button onclick="openModal('groupModal')" class="btn-circle" style="width:30px; height:30px; font-size:20px">+</button>
        </div>
        <div class="group-list" id="groupList"></div>
        <div style="padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 0.7rem; opacity: 0.5;">
            UID: <span id="myUidDisplay">...</span>
        </div>
    </div>

    <div class="main-chat">
        <div class="chat-header">
            <div>
                <b id="activeGroupName">Select a chat</b><br>
                <small id="roomDisplay" style="opacity:0.5; font-size:10px"></small>
            </div>
            <div style="display:flex; gap:10px">
                <button onclick="toggleSecretInput()" style="background:none; border:1px solid var(--secondary); color:var(--secondary); padding:5px 10px; border-radius:10px; cursor:pointer; font-size:12px">🔓 Unlock</button>
                <button onclick="logout()" style="background:none; border:1px solid #ef4444; color:#ef4444; padding:5px 10px; border-radius:10px; cursor:pointer; font-size:12px">Logout</button>
            </div>
        </div>

        <div id="lockerRoom" style="display:none; padding: 20px; background: rgba(0,0,0,0.2); text-align: center;">
            <input id="masterKey" type="password" placeholder="Enter Stealth Key..." style="width:200px">
            <button onclick="applyKey()" style="background:var(--accent); border:none; padding:10px 20px; border-radius:10px; cursor:pointer">Apply</button>
            <button onclick="openModal('friendModal')" style="background:var(--secondary); border:none; padding:10px 20px; border-radius:10px; cursor:pointer; margin-left:5px">Add Member</button>
        </div>

        <div class="chat-container" id="chatBox"></div>

        <div class="input-area">
            <textarea id="inputText" placeholder="Message..." oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
            <button class="btn-circle" onclick="sendMessage()">
                <svg viewBox="0 0 24 24" width="20" height="20"><path d="M2,21L23,12L2,3V10L17,12L2,14V21Z"></path></svg>
            </button>
        </div>
    </div>
</div>

<div id="groupModal" class="modal">
    <div class="modal-content">
        <h3>New Group</h3>
        <input id="newGroupName" placeholder="Group Name">
        <button onclick="createGroup()" style="width:100%; padding:10px; background:var(--accent); border:none; border-radius:10px;">Create</button>
        <button onclick="closeModal('groupModal')" style="width:100%; margin-top:5px; background:none; border:none; color:white;">Cancel</button>
    </div>
</div>

<div id="friendModal" class="modal">
    <div class="modal-content">
        <h3>Add Member</h3>
        <input id="friendUid" placeholder="Paste Friend UID">
        <button onclick="addFriend()" style="width:100%; padding:10px; background:var(--accent); border:none; border-radius:10px;">Add to Group</button>
        <button onclick="closeModal('friendModal')" style="width:100%; margin-top:5px; background:none; border:none; color:white;">Cancel</button>
    </div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyAqBq5P0It0bUcugEN6XxNM9DaO7JtFans", authDomain: "ciphera-1.firebaseapp.com", projectId: "ciphera-1", storageBucket: "ciphera-1.firebasestorage.app", messagingSenderId: "562339080162", appId: "1:562339080162:web:027e5fa3066dea8131bbbb" };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(); const db = firebase.firestore();
let userId, roomId, roomKey, isDecoded = false, allMessages = [], unsubscribeMessages = null;

auth.onAuthStateChanged(u => { 
    if(u){ 
        userId = u.uid; 
        document.getElementById("myUidDisplay").innerText = userId;
        document.getElementById("authBox").style.display="none"; 
        document.getElementById("app").style.display="flex"; 
        loadGroups();
    } else { 
        document.getElementById("authBox").style.display="block"; 
        document.getElementById("app").style.display="none"; 
    } 
});

function login() { auth.signInWithEmailAndPassword(email.value, password.value).catch(e => alert(e.message)); }

/* --- SIGN UP LOGIC --- */
function signup() {
    if (!email.value || !password.value) {
        alert("Please enter an email and password to sign up.");
        return;
    }
    auth.createUserWithEmailAndPassword(email.value, password.value)
        .then(() => alert("Account Created!"))
        .catch(e => alert(e.message));
}

/* --- FORGOT PASSWORD LOGIC --- */
function forgotPassword() {
    const emailField = document.getElementById("email").value;
    if (!emailField) {
        alert("Please enter your email address first so we know where to send the link.");
        return;
    }
    auth.sendPasswordResetEmail(emailField)
        .then(() => alert("Reset email sent! Check your inbox."))
        .catch(e => alert(e.message));
}

function logout() { if(confirm("Sign out?")) auth.signOut().then(() => location.reload()); }

function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

async function createGroup() {
    const name = document.getElementById("newGroupName").value;
    if(!name) return;
    const g = await db.collection("groups").add({ name, members: [userId], createdAt: Date.now() });
    closeModal('groupModal');
    switchGroup(g.id, name);
}

function loadGroups() {
    db.collection("groups").where("members", "array-contains", userId).onSnapshot(sn => {
        const list = document.getElementById("groupList");
        list.innerHTML = "";
        sn.forEach(doc => {
            const data = doc.data();
            const div = document.createElement("div");
            div.className = `group-item ${roomId === doc.id ? 'active-group' : ''}`;
            div.innerHTML = `<div style="width:40px; height:40px; border-radius:50%; background:var(--secondary); display:flex; align-items:center; justify-content:center; font-weight:bold">${data.name[0].toUpperCase()}</div>
                             <div><b>${data.name}</b></div>`;
            div.onclick = () => switchGroup(doc.id, data.name);
            list.appendChild(div);
        });
    });
}

function switchGroup(id, name) {
    roomId = id;
    document.getElementById("activeGroupName").innerText = name;
    document.getElementById("roomDisplay").innerText = id;
    loadGroups();
    listenMessages();
}

async function addFriend() {
    const fUid = document.getElementById("friendUid").value;
    if(!fUid || !roomId) return;
    await db.collection("groups").doc(roomId).update({ members: firebase.firestore.FieldValue.arrayUnion(fUid) });
    closeModal('friendModal');
    alert("Member Added!");
}

function toggleSecretInput() { 
    const box = document.getElementById("lockerRoom");
    if(isDecoded) { isDecoded = false; roomKey = null; renderAllMessages(); box.style.display = "none"; }
    else { box.style.display = (box.style.display === "none") ? "block" : "none"; }
}

function applyKey() { 
    roomKey = document.getElementById("masterKey").value; 
    if(roomKey) { isDecoded = true; document.getElementById("lockerRoom").style.display = "none"; renderAllMessages(); } 
}

function renderAllMessages() {
    const chatBox = document.getElementById("chatBox"); chatBox.innerHTML = "";
    allMessages.forEach(m => {
        let d = document.createElement("div"); d.className = "message " + (m.sender === userId ? "sent" : "received");
        let content;
        if(isDecoded) {
            try {
                const bytes = CryptoJS.AES.decrypt(m.text, roomKey);
                content = bytes.toString(CryptoJS.enc.Utf8) || "???";
            } catch (e) { content = "???"; }
        } else {
            content = `<span style="opacity:0.3; font-family:monospace;">${m.text.substring(0,12)}...</span>`;
        }
        d.innerHTML = `<div>${content}</div>`;
        chatBox.appendChild(d);
    });
    chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage() {
    if(!roomId || !isDecoded) return alert("Select group and Unlock with Key first!");
    let input = document.getElementById("inputText");
    if(!input.value.trim()) return;
    db.collection("groups").doc(roomId).collection("messages").add({ 
        text: CryptoJS.AES.encrypt(input.value, roomKey).toString(), 
        sender: userId, 
        time: Date.now() 
    });
    input.value = "";
}

function listenMessages() {
    if(unsubscribeMessages) unsubscribeMessages();
    unsubscribeMessages = db.collection("groups").doc(roomId).collection("messages").orderBy("time", "asc").onSnapshot(sn => {
        allMessages = []; sn.forEach(doc => allMessages.push({ id: doc.id, ...doc.data() })); renderAllMessages();
    });
}
</script>
</body>
</html>
