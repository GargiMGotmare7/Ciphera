<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciphera | Stealth Portal</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>

    <style>
        :root {
            --bg: #020617;
            --sidebar: rgba(15, 23, 42, 0.6);
            --card: rgba(30, 41, 59, 0.4);
            --accent: #38bdf8;
            --secondary: #c084fc;
            --text: #f1f5f9;
            --glass-border: rgba(255, 255, 255, 0.1);
            --danger: #ef4444;
        }

        * { box-sizing: border-box; transition: all 0.2s ease-in-out; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #020617);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #authBox {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--card); backdrop-filter: blur(25px);
            padding: 40px; border-radius: 30px; border: 1px solid var(--glass-border);
            text-align: center; width: 350px; z-index: 100;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        #authBox h2 { 
            font-size: 2.5rem; font-weight: 800; margin-bottom: 25px; 
            background: linear-gradient(to right, var(--accent), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        input, textarea {
            width: 100%; padding: 14px; margin: 10px 0; 
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            border-radius: 15px; color: white; outline: none;
        }
        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.1); }

        #app { display: none; width: 100%; height: 100%; flex-direction: row; }

        .sidebar {
            width: 320px; background: var(--sidebar); backdrop-filter: blur(15px);
            border-right: 1px solid var(--glass-border); display: flex; flex-direction: column;
        }

        .sidebar-header { padding: 30px 20px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; }

        .group-list { flex: 1; overflow-y: auto; padding: 15px; }
        
        .group-item {
            position: relative;
            padding: 12px; margin-bottom: 10px; border-radius: 18px; cursor: pointer;
            display: flex; align-items: center; gap: 12px; border: 1px solid transparent;
        }
        .group-item:hover { background: rgba(255,255,255,0.05); transform: scale(1.02); }
        .active-group { background: rgba(56, 189, 248, 0.15); border-color: var(--accent); }

        .delete-grp-btn {
            position: absolute; top: 10px; right: 10px;
            width: 22px; height: 22px; border-radius: 50%;
            background: rgba(239, 68, 68, 0.2); color: var(--danger);
            border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 10px; opacity: 0;
        }
        .group-item:hover .delete-grp-btn { opacity: 1; }

        .main-chat { flex: 1; display: flex; flex-direction: column; position: relative; }
        .chat-header { 
            padding: 20px 30px; background: rgba(15, 23, 42, 0.3); 
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .chat-container { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; scroll-behavior: smooth; }

        .message { 
            position: relative; padding: 12px 18px; border-radius: 20px; margin: 8px 0; 
            max-width: 75%; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word;
        }
        .sent { background: linear-gradient(135deg, var(--accent), #6366f1); margin-left: auto; color: white; border-bottom-right-radius: 4px; }
        .received { background: #1e293b; margin-right: auto; color: #e2e8f0; border-bottom-left-radius: 4px; }

        .msg-sender-name { font-size: 10px; font-weight: bold; margin-bottom: 4px; opacity: 0.7; display: block; }
        .edited-pill { font-size: 9px; opacity: 0.4; font-style: italic; margin-left: 5px; }

        /* --- STEALTH PULSE INDICATOR --- */
        .status-pulse { font-size: 14px; margin-left: 10px; line-height: 1; font-weight: bold; }
        .pulse-seen { color: #00f2ff !important; text-shadow: 0 0 10px #00f2ff; }
        .pulse-delivered { color: #64748b !important; }
        .pulse-sent { color: #ffffff !important; opacity: 0.1; }

        .msg-actions { position: absolute; top: 50%; transform: translateY(-50%); display: flex; gap: 5px; opacity: 0; transition: 0.2s; z-index: 5; }
        .sent .msg-actions { left: -140px; }
        .received .msg-actions { right: -140px; }
        .message:hover .msg-actions { opacity: 1; }
        
        .action-btn { width: 28px; height: 28px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; color: white; background: rgba(255,255,255,0.1); }

        .reactions-container { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
        .reaction-pill { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); padding: 2px 8px; border-radius: 10px; font-size: 12px; cursor: pointer; }
        .reaction-pill.active { border-color: var(--accent); background: rgba(56, 189, 248, 0.2); }

        .reply-wrapper { position: relative; margin-bottom: 8px; overflow: hidden; display: flex; align-items: stretch; background: rgba(0, 0, 0, 0.2); border-radius: 8px; }
        .reply-bar-accent { width: 4px; flex-shrink: 0; background: var(--accent); }
        .reply-preview-text { padding: 8px 12px; font-size: 12px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }

        #replyBar { display: none; padding: 12px 25px; background: rgba(56, 189, 248, 0.1); border-top: 1px solid var(--glass-border); justify-content: space-between; align-items: center; }
        .input-area { padding: 25px; display: flex; align-items: center; gap: 15px; }
        .btn-circle { background: linear-gradient(135deg, var(--accent), var(--secondary)); border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 200; align-items: center; justify-content: center; }
        .modal-content { background: #0f172a; padding: 30px; border-radius: 25px; width: 320px; border: 1px solid var(--accent); }
        emoji-picker { width: 100%; height: 350px; --background: #0f172a; }
    </style>
</head>
<body>

<div id="authBox">
    <h2>Ciphera</h2>
    <input id="email" placeholder="Email" type="email">
    <input id="password" placeholder="Password" type="password">
    <div style="display: flex; gap: 10px; margin-top: 10px;">
        <button onclick="login()" style="flex: 1; background: var(--accent); color: var(--bg); padding: 14px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer;">Login</button>
        <button onclick="signup()" style="flex: 1; background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 14px; border-radius: 15px; font-weight: bold; cursor: pointer;">Sign Up</button>
    </div>
</div>

<div id="app">
    <div class="sidebar">
        <div class="sidebar-header">
            <div style="display:flex; align-items:center; gap:10px; cursor:pointer;" onclick="openModal('profileModal')">
                <img id="myAvatar" src="https://ui-avatars.com/api/?name=User" style="width:35px; height:35px; border-radius:50%; border: 2px solid var(--accent);">
                <div><b id="myNameDisplay" style="display:block; font-size:14px;">User</b></div>
            </div>
            <button onclick="openModal('groupModal')" class="btn-circle" style="width:35px; height:35px;">+</button>
        </div>
        <div class="group-list" id="groupList"></div>
    </div>

    <div class="main-chat">
        <div id="placeholderUI" style="flex: 1; display: flex; align-items: center; justify-content: center;">
            <h1 style="opacity: 0.1;">SELECT CHAT</h1>
        </div>

        <div id="chatInterface" style="display:none; flex-direction: column; height: 100%;">
            <div class="chat-header">
                <b id="activeGroupName">Chat</b>
                <button onclick="toggleSecretInput()" id="lockStatusBtn" style="background:rgba(192, 132, 252, 0.1); border:1px solid var(--secondary); color:var(--secondary); padding:6px 15px; border-radius:20px; cursor:pointer;">🔓 UNLOCK</button>
            </div>

            <div id="lockerRoom" style="display:none; padding: 20px; background: rgba(0,0,0,0.3); text-align: center;">
                <input id="masterKey" type="password" placeholder="Stealth Key..." style="width:200px;">
                <button onclick="applyKey()" style="background:var(--accent); border:none; padding:10px 20px; border-radius:12px; cursor:pointer;">Apply</button>
                <button onclick="openModal('friendModal')" style="background:var(--secondary); border:none; padding:10px 20px; border-radius:12px; cursor:pointer;">Invite</button>
            </div>

            <div class="chat-container" id="chatBox"></div>

            <div id="replyBar">
                <div class="reply-wrapper" id="replyPreviewArea" style="flex:1;"><div class="reply-bar-accent"></div><div class="reply-preview-text" id="replyPreviewText"></div></div>
                <button onclick="cancelReply()" style="background:none; border:none; color:var(--danger); cursor:pointer;">✕</button>
            </div>

            <div class="input-area">
                <textarea id="inputText" placeholder="Message..."></textarea>
                <button class="btn-circle" onclick="handleSendAction()"><span id="sendIcon">➤</span></button>
            </div>
        </div>
    </div>
</div>

<div id="reactionModal" class="modal"><div class="modal-content"><emoji-picker id="fullEmojiPicker" class="dark"></emoji-picker><button onclick="closeModal('reactionModal')">Close</button></div></div>
<div id="profileModal" class="modal"><div class="modal-content"><h3>Profile</h3><input id="profUsername" placeholder="Name"><button onclick="saveProfile()">Save</button></div></div>
<div id="groupModal" class="modal"><div class="modal-content"><h3>New Chat</h3><input id="newGroupName" placeholder="Group Name"><button onclick="createGroup()">Create</button></div></div>
<div id="friendModal" class="modal"><div class="modal-content"><h3>Invite</h3><input id="friendUid" placeholder="UID"><button onclick="addFriend()">Add</button></div></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAqBq5P0It0bUcugEN6XxNM9DaO7JtFans", authDomain: "ciphera-1.firebaseapp.com", projectId: "ciphera-1", storageBucket: "ciphera-1.firebasestorage.app", messagingSenderId: "562339080162", appId: "1:562339080162:web:027e5fa3066dea8131bbbb" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.firestore();

    let userId, roomId, roomKey, isDecoded = false, allMessages = [], unsubscribeMessages = null, replyingTo = null, editingMsgId = null, reactingToId = null;
    let currentUserProfile = { username: "User" };

    document.querySelector('emoji-picker').addEventListener('emoji-click', e => addReaction(e.detail.unicode));

    auth.onAuthStateChanged(u => { if(u){ userId = u.uid; syncProfile(); loadGroups(); document.getElementById("authBox").style.display="none"; document.getElementById("app").style.display="flex"; } });

    async function syncProfile() {
        const doc = await db.collection("users").doc(userId).get();
        if(doc.exists) { currentUserProfile = doc.data(); document.getElementById("myNameDisplay").innerText = currentUserProfile.username; }
    }

    async function saveProfile() {
        const username = document.getElementById("profUsername").value;
        await db.collection("users").doc(userId).set({ username }, { merge: true });
        closeModal('profileModal'); syncProfile();
    }

    function login() { auth.signInWithEmailAndPassword(document.getElementById("email").value, document.getElementById("password").value); }
    function signup() { auth.createUserWithEmailAndPassword(document.getElementById("email").value, document.getElementById("password").value); }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    async function createGroup() {
        const name = document.getElementById("newGroupName").value;
        const g = await db.collection("groups").add({ name, members: [userId], createdAt: Date.now() });
        closeModal('groupModal'); switchGroup(g.id, name);
    }

    function loadGroups() {
        db.collection("groups").where("members", "array-contains", userId).onSnapshot(sn => {
            const list = document.getElementById("groupList"); list.innerHTML = "";
            sn.forEach(doc => {
                const div = document.createElement("div"); div.className = "group-item";
                div.innerHTML = `<b>${doc.data().name}</b><button class="delete-grp-btn" onclick="deleteGroup(event, '${doc.id}')">✕</button>`;
                div.onclick = () => switchGroup(doc.id, doc.data().name);
                list.appendChild(div);
            });
        });
    }

    async function deleteGroup(e, id) { e.stopPropagation(); if(confirm("Delete Group?")) await db.collection("groups").doc(id).delete(); }

    function switchGroup(id, name) {
        roomId = id; isDecoded = false; 
        document.getElementById("placeholderUI").style.display="none"; document.getElementById("chatInterface").style.display="flex";
        document.getElementById("activeGroupName").innerText = name;
        listenMessages();
    }

    async function addFriend() {
        const fUid = document.getElementById("friendUid").value;
        await db.collection("groups").doc(roomId).update({ members: firebase.firestore.FieldValue.arrayUnion(fUid) });
        closeModal('friendModal');
    }

    function toggleSecretInput() { 
        const box = document.getElementById("lockerRoom");
        if(isDecoded) { isDecoded = false; document.getElementById("lockStatusBtn").innerText = "🔓 UNLOCK"; renderAllMessages(); box.style.display = "none"; }
        else { box.style.display = box.style.display === "none" ? "block" : "none"; }
    }

    function applyKey() { 
        roomKey = document.getElementById("masterKey").value; 
        if(roomKey) { isDecoded = true; document.getElementById("lockStatusBtn").innerText = "🔓 UNLOCKED"; document.getElementById("lockerRoom").style.display="none"; renderAllMessages(); } 
    }

    async function markAsSeen(msgId, currentSeenBy) {
        if (!currentSeenBy.includes(userId)) {
            await db.collection("groups").doc(roomId).collection("messages").doc(msgId).update({
                seenBy: firebase.firestore.FieldValue.arrayUnion(userId)
            });
        }
    }

    function renderAllMessages() {
        const chatBox = document.getElementById("chatBox"); chatBox.innerHTML = "";
        allMessages.forEach(m => {
            let d = document.createElement("div"); d.className = "message " + (m.sender === userId ? "sent" : "received");
            if (m.sender !== userId && isDecoded) markAsSeen(m.id, m.seenBy || []);

            let content;
            if(isDecoded) {
                try { content = CryptoJS.AES.decrypt(m.text, roomKey).toString(CryptoJS.enc.Utf8) || "???"; } catch(e) { content = "⚠️ Error"; }
            } else { content = "••••••••"; }

            // Reply Logic
            let replyHtml = "";
            if (m.replyTo && isDecoded) {
                try {
                    const rText = CryptoJS.AES.decrypt(m.replyTo.text, roomKey).toString(CryptoJS.enc.Utf8) || "Encrypted";
                    replyHtml = `<div class="reply-wrapper"><div class="reply-bar-accent"></div><div class="reply-preview-text">${rText}</div></div>`;
                } catch(e) { replyHtml = `<div class="reply-wrapper"><div class="reply-bar-accent"></div><div class="reply-preview-text">Encrypted</div></div>`; }
            }

            // Reactions Logic
            let reactionHtml = "";
            if(m.reactions && isDecoded) {
                reactionHtml = `<div class="reactions-container">`;
                for(let emoji in m.reactions) {
                    let count = m.reactions[emoji].length;
                    if(count > 0) reactionHtml += `<div class="reaction-pill ${m.reactions[emoji].includes(userId) ? 'active' : ''}" onclick="reactingToId='${m.id}'; addReaction('${emoji}')">${emoji} <span>${count}</span></div>`;
                }
                reactionHtml += `</div>`;
            }

            // Status Logic (The Pulse)
            let statusHtml = "";
            if (m.sender === userId) {
                if (isDecoded) {
                    const seen = (m.seenBy || []).filter(id => id !== userId).length > 0;
                    statusHtml = `<span class="status-pulse ${seen ? 'pulse-seen' : 'pulse-delivered'}">${seen ? '⦿' : '●'}</span>`;
                } else { statusHtml = `<span class="status-pulse pulse-sent">○</span>`; }
            }

            let editedTag = m.edited ? `<span class="edited-pill">(edited)</span>` : "";
            let actionButtons = isDecoded ? `<div class="msg-actions">
                <button class="action-btn" onclick="openReaction('${m.id}')">☺</button>
                <button class="action-btn" onclick="setReply('${m.id}', '${m.text}')">⮪</button>
                ${m.sender === userId ? `<button class="action-btn" onclick="setEdit('${m.id}', '${m.text}')">✎</button>` : ''}
                ${m.sender === userId ? `<button class="action-btn" onclick="deleteMessage('${m.id}')">✕</button>` : ''}
            </div>` : "";

            d.innerHTML = `<span class="msg-sender-name">${m.senderName}</span>${replyHtml}<div style="display:flex; justify-content:space-between; align-items:flex-end;"><div>${content}${editedTag}</div>${statusHtml}</div>${reactionHtml}${actionButtons}`;
            chatBox.appendChild(d);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function handleSendAction() {
        const input = document.getElementById("inputText"), txt = input.value.trim();
        if(!txt || !isDecoded) return;
        if(editingMsgId) {
            const enc = CryptoJS.AES.encrypt(txt, roomKey).toString();
            await db.collection("groups").doc(roomId).collection("messages").doc(editingMsgId).update({ text: enc, edited: true });
            cancelEdit();
        } else {
            const msgData = { text: CryptoJS.AES.encrypt(txt, roomKey).toString(), sender: userId, senderName: currentUserProfile.username, time: Date.now(), seenBy: [userId], edited: false, reactions: {} };
            if(replyingTo) msgData.replyTo = { id: replyingTo.id, text: replyingTo.text };
            await db.collection("groups").doc(roomId).collection("messages").add(msgData);
            input.value = ""; cancelReply();
        }
    }

    function setReply(id, text) { 
        replyingTo = { id, text }; 
        document.getElementById("replyBar").style.display="flex"; 
        try { document.getElementById("replyPreviewText").innerText = CryptoJS.AES.decrypt(text, roomKey).toString(CryptoJS.enc.Utf8); } catch(e) { document.getElementById("replyPreviewText").innerText = "Encrypted"; }
    }
    function cancelReply() { replyingTo = null; document.getElementById("replyBar").style.display="none"; }

    function setEdit(id, enc) { 
        editingMsgId = id; cancelReply();
        try { document.getElementById("inputText").value = CryptoJS.AES.decrypt(enc, roomKey).toString(CryptoJS.enc.Utf8); } catch(e) {}
        document.getElementById("sendIcon").innerText = "✓";
    }
    function cancelEdit() { editingMsgId = null; document.getElementById("inputText").value = ""; document.getElementById("sendIcon").innerText = "➤"; }

    function openReaction(id) { reactingToId = id; openModal('reactionModal'); }
    async function addReaction(emoji) {
        if(!reactingToId) return;
        const ref = db.collection("groups").doc(roomId).collection("messages").doc(reactingToId);
        const doc = await ref.get();
        let re = doc.data().reactions || {};
        if(!re[emoji]) re[emoji] = [];
        re[emoji] = re[emoji].includes(userId) ? re[emoji].filter(u => u !== userId) : [...re[emoji], userId];
        await ref.update({ reactions: re });
        closeModal('reactionModal');
    }

    async function deleteMessage(id) { if(confirm("Delete?")) await db.collection("groups").doc(roomId).collection("messages").doc(id).delete(); }

    function listenMessages() {
        if(unsubscribeMessages) unsubscribeMessages();
        unsubscribeMessages = db.collection("groups").doc(roomId).collection("messages").orderBy("time", "asc").onSnapshot(sn => {
            allMessages = []; sn.forEach(doc => allMessages.push({ id: doc.id, ...doc.data() })); renderAllMessages();
        });
    }
</script>
</body>
</html>
