<div class="sidebar">
    <div class="sidebar-header">
        <h3 style="margin:0; color:var(--accent); letter-spacing: -1px;">Messages</h3>
        <button onclick="openModal('groupModal')" class="btn-circle" style="width:35px; height:35px;">+</button>
    </div>
    <div class="group-list" id="groupList"></div>
    <div style="padding: 15px 20px; border-top: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center;">
        <div style="font-size: 10px; opacity: 0.4;">UID: <span id="myUidDisplay">...</span></div>
        <button onclick="logout()" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:11px; font-weight:bold;">LOGOUT</button>
    </div>
</div>
