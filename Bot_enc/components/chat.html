<style>
    /* Adding basic styles to ensure visibility */
    .main-chat { font-family: sans-serif; background: #1a1a1a; color: white; height: 100vh; display: flex; flex-direction: column; }
    .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid #333; }
    .input-area { display: flex; align-items: center; padding: 15px; gap: 10px; background: #222; }
    #inputText { flex: 1; background: #333; color: white; border: none; padding: 10px; border-radius: 5px; resize: none; }
    .btn-circle { width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: 0.2s; }
    #micBtn { background: #444; color: white; }
    .send-btn { background: #007bff; color: white; }
    .voice-msg-wrapper { align-self: flex-end; background: #333; padding: 8px; border-radius: 15px 15px 0 15px; }
    audio { height: 35px; width: 220px; }
</style>

<div class="main-chat">
    <div id="chatInterface" style="display:flex; flex-direction: column; height: 100%;">
        <div class="chat-header" style="padding: 15px; border-bottom: 1px solid #333;">
            <b id="activeGroupName">Stealth Chat</b>
        </div>

        <div class="chat-container" id="chatBox">
            </div>

        <div class="input-area">
            <textarea id="inputText" placeholder="Type something secret..."></textarea>
            
            <button id="micBtn" class="btn-circle" onclick="toggleRecording()">🎤</button>
            
            <button class="btn-circle send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<script>
let mediaRecorder;
let audioChunks = [];
let isRecording = false;

async function toggleRecording() {
    const micBtn = document.getElementById('micBtn');
    
    if (!isRecording) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);

            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const audioUrl = URL.createObjectURL(audioBlob);
                renderVoiceMessage(audioUrl);
                
                // Turn off mic hardware light
                stream.getTracks().forEach(track => track.stop());
            };

            mediaRecorder.start();
            isRecording = true;
            micBtn.style.background = "#ff4444";
            micBtn.innerText = "🛑";
        } catch (err) {
            alert("Please allow microphone access in your browser settings!");
        }
    } else {
        mediaRecorder.stop();
        isRecording = false;
        micBtn.style.background = "#444";
        micBtn.innerText = "🎤";
    }
}

function renderVoiceMessage(url) {
    const chatBox = document.getElementById('chatBox');
    const div = document.createElement('div');
    div.className = 'voice-msg-wrapper';
    
    const audio = document.createElement('audio');
    audio.src = url;
    audio.controls = true;
    
    div.appendChild(audio);
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById('inputText');
    if (!input.value.trim()) return;
    
    const chatBox = document.getElementById('chatBox');
    const msg = document.createElement('div');
    msg.innerText = input.value;
    msg.style.cssText = "align-self: flex-end; background: #007bff; padding: 10px; border-radius: 10px;";
    
    chatBox.appendChild(msg);
    input.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>
